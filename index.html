<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ── RESET ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sw: 260px;
  --pw: 300px;
  --ch:  220px;

  --bg:       #07080a;
  --bg2:      #0d0f12;
  --bg3:      #121519;
  --border:   #1c2028;
  --border2:  #252b35;
  --text:     #8a9ab0;
  --text2:    #4a5568;
  --text3:    #2a3040;
  --gold:     #c8a96e;
  --gold2:    #8a6d3e;
  --blue:     #4a7fa8;
  --teal:     #3a8a7a;
  --violet:   #6a5a9a;
  --rose:     #8a4a5a;
  --sage:     #4a7a5a;
  --font-mono:  'DM Mono', monospace;
  --font-serif: 'Cormorant Garamond', serif;
  --r: 6px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 12px; line-height: 1.6; overflow: hidden; user-select: none; }

/* ── GRID ──────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: var(--sw) 4px 1fr 4px var(--pw);
  grid-template-rows: 44px 1fr 4px var(--ch);
  height: 100vh;
  background: var(--border);
  gap: 1px;
}

.topbar  { grid-column: 1 / -1; grid-row: 1; background: var(--bg2); display: flex; align-items: center; padding: 0 16px; gap: 14px; border-bottom: 1px solid var(--border); }
.sidebar { grid-column: 1;      grid-row: 2 / 5; background: var(--bg2); overflow-y: auto; }
.main    { grid-column: 3;      grid-row: 2;     background: var(--bg);  overflow: hidden; position: relative; }
.panel   { grid-column: 5;      grid-row: 2 / 5; background: var(--bg2); overflow: hidden; display: flex; flex-direction: column; }
.chatbar { grid-column: 3;      grid-row: 4;     background: var(--bg2); display: flex; flex-direction: column; border-top: 1px solid var(--border); }

/* ── RESIZE HANDLES ────────────────────────────────────────── */
.rh-col { grid-row: 2 / 5; background: var(--border); cursor: col-resize; position: relative; transition: background 0.15s; z-index: 20; }
.rh-row { grid-column: 3;  grid-row: 3; background: var(--border); cursor: row-resize; position: relative; transition: background 0.15s; z-index: 20; }
.rh-col::after { content:''; position: absolute; inset: 0 -4px; }
.rh-row::after { content:''; position: absolute; inset: -4px 0; }
.rh-col:hover, .rh-row:hover,
.rh-col.dragging, .rh-row.dragging { background: var(--gold2); }

/* ── TOPBAR ────────────────────────────────────────────────── */
.topbar-name { font-family: var(--font-serif); font-size: 18px; font-weight: 300; font-style: italic; color: var(--gold); letter-spacing: 2px; }
.topbar-sep  { color: var(--text3); }
.topbar-stat { font-size: 9px; letter-spacing: 1px; color: var(--text3); }
.topbar-stat span { color: var(--text2); }
.busy-indicator { font-size: 9px; color: var(--gold2); letter-spacing: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.spacer { flex: 1; }

/* ── PROFILE CARD ──────────────────────────────────────────── */
.profile-card { position: relative; overflow: hidden; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.profile-img  { width: 100%; height: 220px; object-fit: cover; object-position: center 15%; display: block; filter: saturate(0.60) brightness(0.85); }
.profile-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 36px 14px 12px; background: linear-gradient(to top, rgba(7,8,10,0.92) 0%, rgba(7,8,10,0.35) 55%, transparent 100%); }
.profile-name { font-family: var(--font-mono); font-size: 18px; font-weight: 300; color: #ccd6ea; letter-spacing: 4px; text-transform: uppercase; line-height: 1; margin-bottom: 7px; }
.profile-meta { display: flex; align-items: center; gap: 8px; }
.profile-activity { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-top: 4px; }
.profile-mood-badge { position: absolute; top: 12px; right: 12px; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; border-radius: 10px; padding: 3px 10px; border: 1px solid currentColor; background: rgba(7,8,10,0.6); backdrop-filter: blur(6px); transition: color 2s, background 2s, border-color 2s; }
.mbti-pill { font-size: 8px; letter-spacing: 3px; color: #7a90aa; border: 1px solid #2a3545; border-radius: 20px; padding: 2px 10px; }
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 6px var(--teal); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── SIDEBAR SECTIONS ──────────────────────────────────────── */
.section { padding: 14px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 7px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }

/* Vitals */
.vital { margin-bottom: 10px; }
.vital-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
.vital-val { color: var(--text); }
.bar-track { height: 2px; background: var(--bg3); border-radius: 1px; }
.bar-fill  { height: 100%; border-radius: 1px; transition: width 1.5s ease; }
.bar-energy    { background: var(--blue);   box-shadow: 0 0 4px var(--blue); }
.bar-social    { background: var(--violet); box-shadow: 0 0 4px var(--violet); }
.bar-curiosity { background: var(--teal);   box-shadow: 0 0 4px var(--teal); }

/* Soul */
.soul-slider { margin-bottom: 14px; }
.soul-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.soul-labels { display: flex; gap: 6px; font-size: 8px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.soul-labels span.active { color: var(--gold2); }
.soul-val-display { font-size: 9px; color: var(--text3); }
.slider-track { height: 4px; background: var(--bg3); border-radius: 2px; position: relative; cursor: pointer; }
.slider-fill  { position: absolute; top: 0; height: 100%; border-radius: 2px; background: linear-gradient(to right, var(--blue), var(--gold)); transition: width 1.2s ease; }
.slider-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: var(--gold); transition: left 1.2s ease; box-shadow: 0 0 6px var(--gold2); }
.soul-desc { font-family: var(--font-serif); font-size: 13px; font-style: italic; color: var(--text2); line-height: 1.7; padding: 10px 0 2px; }
.world-line { font-size: 11px; color: var(--text2); line-height: 1.8; }

/* Interests */
.interest-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
.interest-tag { font-size: 8px; letter-spacing: 1px; color: var(--text2); border: 1px solid var(--border2); border-radius: 12px; padding: 2px 8px; cursor: default; transition: all 0.2s; }
.interest-tag:hover { border-color: var(--gold2); color: var(--gold); }

/* Activity */
.activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.act-btn { padding: 7px 5px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.act-btn:hover  { border-color: var(--border2); color: var(--text); }
.act-btn.active { border-color: var(--gold2); color: var(--gold); background: #1a150a; }
.act-icon { font-size: 13px; }

/* People */
.person-card { display: flex; flex-direction: column; gap: 5px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.person-card:last-child { border-bottom: none; }
.person-header { display: flex; justify-content: space-between; align-items: baseline; }
.person-name { font-size: 11px; color: var(--text); letter-spacing: 0.5px; }
.person-meta { font-size: 8px; color: var(--text3); letter-spacing: 0.5px; }
.person-bars { display: flex; flex-direction: column; gap: 4px; }
.person-bar-row { display: flex; align-items: center; gap: 8px; }
.person-bar-label { font-size: 8px; letter-spacing: 1px; color: var(--text3); width: 40px; text-transform: uppercase; }
.person-bar-track { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.person-bar-fill  { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.warmth-fill  { background: var(--gold2); }
.contact-fill { background: var(--teal); }
.person-notes { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
.person-note { font-size: 9px; color: var(--text2); font-style: italic; line-height: 1.5; padding-left: 8px; border-left: 1px solid var(--border2); }
.person-note.followed-up { color: var(--text3); text-decoration: line-through; }

/* ── GRAPH ─────────────────────────────────────────────────── */
#graph-canvas { width: 100%; height: 100%; display: block; }
.graph-overlay { position: absolute; bottom: 10px; left: 12px; font-size: 8px; color: var(--text3); letter-spacing: 2px; pointer-events: none; }
.graph-selected-info { position: absolute; top: 12px; right: 12px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r); padding: 10px 14px; max-width: 210px; display: none; }
.graph-selected-info.visible { display: block; }
.sel-label { font-size: 11px; color: var(--gold); margin-bottom: 4px; }
.sel-note  { font-size: 9px; color: var(--text2); line-height: 1.6; margin-bottom: 8px; }
.sel-expand { font-size: 8px; letter-spacing: 2px; color: var(--gold2); border: 1px solid #2a2010; border-radius: 3px; padding: 3px 8px; cursor: pointer; background: none; font-family: var(--font-mono); }
.sel-expand:hover { color: var(--gold); border-color: var(--gold2); }

/* ── RIGHT PANEL ───────────────────────────────────────────── */
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ptab { flex: 1; padding: 9px 0; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; text-align: center; color: var(--text3); cursor: pointer; background: none; border: none; font-family: var(--font-mono); border-bottom: 2px solid transparent; transition: all 0.2s; }
.ptab.active { color: var(--gold2); border-bottom-color: var(--gold2); }
.panel-body { flex: 1; overflow-y: auto; padding: 10px; }
.panel-body::-webkit-scrollbar { width: 2px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

/* Memory */
.memory-item { padding: 7px 0; border-bottom: 1px solid var(--border); }
.memory-meta { font-size: 8px; color: var(--text3); letter-spacing: 1px; margin-bottom: 3px; }
.memory-text { font-size: 9px; color: var(--text2); line-height: 1.7; }
.memory-item:hover .memory-text { color: var(--text); }
.memory-dream      { border-left: 2px solid var(--violet); padding-left: 8px; }
.memory-creative   { border-left: 2px solid var(--gold2);  padding-left: 8px; }
.memory-reflection { border-left: 2px solid var(--sage);   padding-left: 8px; }
.memory-journal    { border-left: 2px solid var(--blue);   padding-left: 8px; }

/* Ideas */
.idea-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
.idea-text { font-size: 9px; color: #4a6a8a; line-height: 1.7; }
.idea-text::before { content: "→ "; color: var(--text3); }

/* Mind */
.mind-section-title { font-size: 7px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); padding: 10px 0 5px; }
.want-item  { padding: 6px 0; border-bottom: 1px solid var(--border); }
.want-text  { font-size: 9px; color: var(--text2); line-height: 1.7; }
.want-text.resolved { color: var(--text3); text-decoration: line-through; opacity: 0.5; }
.want-tags  { font-size: 7px; color: var(--text3); letter-spacing: 1px; margin-top: 2px; }
.belief-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
.belief-text { font-size: 9px; color: var(--text2); line-height: 1.7; font-style: italic; }
.belief-conf-track { height: 2px; background: var(--bg3); border-radius: 1px; margin-top: 4px; }
.belief-conf-fill  { height: 100%; border-radius: 1px; background: var(--rose); transition: width 1.5s ease; }

/* Log */
.log-item { padding: 4px 0; font-size: 9px; color: var(--text3); line-height: 1.5; border-bottom: 1px solid var(--border); }
.log-item:first-child { color: var(--text2); }

/* ── ADMIN TAB ─────────────────────────────────────────────── */
.admin-block { margin-bottom: 4px; }
.admin-block-title { font-size: 7px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); padding: 10px 0 8px; }
.admin-vital-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.admin-vital-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); width: 52px; }
.admin-vital-val   { font-size: 9px; color: var(--text); width: 26px; text-align: right; }
.admin-vital-bar   { flex: 1; height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
.admin-vital-fill  { height: 100%; border-radius: 1px; transition: width 1s ease; }
.admin-btn { padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn:hover { border-color: var(--gold2); color: var(--gold); }
.admin-mood-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.admin-mood-btn   { padding: 5px 6px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; text-align: center; cursor: pointer; transition: all 0.2s; }
.admin-mood-btn:hover  { border-color: var(--border2); color: var(--text); }
.admin-mood-btn.active { border-color: currentColor; background: color-mix(in srgb, currentColor 12%, transparent); }
.admin-soul-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.admin-soul-key { font-size: 8px; letter-spacing: 2px; color: var(--text2); width: 20px; text-align: center; }
.admin-soul-num { font-size: 9px; color: var(--text3); width: 28px; text-align: right; }
.admin-reset-btn { margin-top: 6px; width: 100%; padding: 6px; border-radius: var(--r); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.admin-reset-btn:hover { border-color: var(--gold2); color: var(--gold); }
.admin-divider { height: 1px; background: var(--border); margin: 4px 0 10px; }

/* ── CHAT BAR ──────────────────────────────────────────────── */
.chat-messages { flex: 1; overflow-y: auto; padding: 8px 14px; display: flex; flex-direction: column; gap: 7px; }
.chat-messages::-webkit-scrollbar { width: 2px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }
.msg { max-width: 60%; padding: 7px 11px; border-radius: 8px; font-size: 10px; line-height: 1.6; }
.msg-chloe { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px 8px 8px 2px; color: var(--text); }
.msg-user  { align-self: flex-end; background: #0d1a0d; border: 1px solid #1a2a1a; border-radius: 8px 8px 2px 8px; color: #5a8a5a; }
.msg-auto  { border-color: var(--gold2); }
.msg-meta  { font-size: 7px; color: var(--text3); letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
.msg-queued { opacity: 0.45; font-style: italic; }

.chat-input-row { display: flex; align-items: center; gap: 7px; padding: 7px 14px; border-top: 1px solid var(--border); }
.person-pills   { display: flex; gap: 4px; flex-shrink: 0; }
.person-pill {
  padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); font-family: var(--font-mono);
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.person-pill:hover  { border-color: var(--border2); color: var(--text); }
.person-pill.active { border-color: var(--gold2); color: var(--gold); background: rgba(200,169,110,0.08); }
.chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 7px 11px; color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; transition: border-color 0.2s; }
.chat-input:focus { border-color: var(--gold2); }
.chat-input::placeholder { color: var(--text3); }
.send-btn { padding: 7px 13px; background: #1a150a; border: 1px solid var(--gold2); border-radius: var(--r); color: var(--gold2); font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.send-btn:hover { background: #251e0f; color: var(--gold); }

/* ── NODE CONTEXT MENU ─────────────────────────────────────── */
.node-menu {
  position: fixed; display: none; z-index: 100;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  min-width: 120px;
}
.node-menu-label { font-size: 9px; color: var(--gold); letter-spacing: 1px; padding: 3px 6px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.node-menu-btn { display: block; width: 100%; padding: 5px 8px; background: none; border: none; color: var(--text2); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-align: left; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
.node-menu-btn:hover { background: var(--border); color: var(--rose); }

/* ── SCROLLBARS ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="shell" id="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-name">Chloe</span>
    <span class="topbar-sep">·</span>
    <span class="topbar-stat">uptime <span id="topbar-uptime">—</span></span>
    <span class="topbar-stat">tick <span id="tick-n">0</span></span>
    <span class="busy-indicator" id="busy" style="display:none">thinking···</span>
    <span class="spacer"></span>
    <span class="topbar-stat" id="topbar-weather"></span>
  </header>

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">

    <div class="profile-card">
      <img class="profile-img" id="profile-img" src="image.webp" alt="">
      <div class="profile-mood-badge" id="mood-pill">content</div>
      <div class="profile-overlay">
        <div class="profile-name">Chloe</div>
        <div class="profile-meta">
          <span class="mbti-pill" id="mbti">INFP</span>
          <span class="state-dot"></span>
        </div>
        <div class="profile-activity" id="state-label">Resting</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">vitals</div>
      <div class="vital">
        <div class="vital-row"><span>energy</span><span class="vital-val" id="v-energy">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-energy" id="b-energy" style="width:0%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>social</span><span class="vital-val" id="v-social">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-social" id="b-social" style="width:0%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>curiosity</span><span class="vital-val" id="v-curiosity">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-curiosity" id="b-curiosity" style="width:0%"></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">world</div>
      <div class="world-line" id="world-season">—</div>
      <div class="world-line" id="world-weather">—</div>
    </div>

    <div class="section">
      <div class="section-title">soul</div>
      <div id="soul-sliders"></div>
      <div class="soul-desc" id="soul-desc">—</div>
    </div>

    <div class="section">
      <div class="section-title">interests</div>
      <div class="interest-cloud" id="interests"></div>
    </div>

    <div class="section">
      <div class="section-title">activity</div>
      <div class="activity-grid" id="activity-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">people</div>
      <div id="people-list"></div>
    </div>

  </aside>

  <!-- LEFT RESIZE HANDLE -->
  <div class="rh-col" data-type="left" id="rh-left"></div>

  <!-- GRAPH -->
  <main class="main">
    <canvas id="graph-canvas"></canvas>
    <div class="graph-overlay">drag node · right-click remove · scroll zoom · drag canvas pan</div>
    <div class="graph-selected-info" id="sel-info">
      <div class="sel-label" id="sel-label"></div>
      <div class="sel-note"  id="sel-note"></div>
      <button class="sel-expand" id="sel-expand-btn">expand</button>
    </div>
  </main>

  <!-- RIGHT RESIZE HANDLE -->
  <div class="rh-col" data-type="right" id="rh-right"></div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('memory')">memory</button>
      <button class="ptab" onclick="switchTab('ideas')">ideas</button>
      <button class="ptab" onclick="switchTab('mind')">mind</button>
      <button class="ptab" onclick="switchTab('admin')">admin</button>
      <button class="ptab" onclick="switchTab('log')">log</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- CHAT RESIZE HANDLE -->
  <div class="rh-row" id="rh-chat"></div>

  <!-- CHAT BAR -->
  <div class="chatbar">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <div class="person-pills" id="person-pills"></div>
      <input class="chat-input" id="chat-input" placeholder="say something…" autocomplete="off" />
      <button class="send-btn" id="send-btn">→</button>
    </div>
  </div>

</div>

<!-- NODE CONTEXT MENU -->
<div class="node-menu" id="node-menu">
  <div class="node-menu-label" id="node-menu-label"></div>
  <button class="node-menu-btn" id="node-menu-remove">remove node</button>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
// Must match the port you pass to uvicorn, e.g. --port 8080
const API      = 'http://localhost:8080';
const POLL_MS  = 4000;

const MOOD_COLORS = {
  content:    '#4a7a5a', restless:   '#8a7a3e', irritable:  '#8a4a4a',
  melancholic:'#4a5a8a', curious:    '#3a8a7a', serene:     '#5a8a6a',
  energized:  '#c8a96e', lonely:     '#6a5a8a',
};
const MOODS = Object.keys(MOOD_COLORS);

const ACTIVITIES = [
  { id:'sleep',   icon:'🌙', label:'Sleep'   },
  { id:'dream',   icon:'💭', label:'Dream'   },
  { id:'rest',    icon:'🛋️', label:'Rest'    },
  { id:'read',    icon:'🔍', label:'Read'    },
  { id:'think',   icon:'🧠', label:'Think'   },
  { id:'message', icon:'💬', label:'Message' },
  { id:'create',  icon:'✨', label:'Create'  },
];

const TRAITS = [
  { key:'EI', left:'E', right:'I' },
  { key:'SN', left:'S', right:'N' },
  { key:'TF', left:'T', right:'F' },
  { key:'JP', left:'J', right:'P' },
];

const DEPTH_COLORS = ['#c8a96e','#4a7fa8','#6a5a9a','#3a8a7a','#8a4a5a','#8a7a3a'];

// ── STATE ────────────────────────────────────────────────────
let state        = null;
let activeTab    = 'memory';
let activePerson = 'teo';

// Graph
let selectedNodeId  = null;
let graph           = { nodes: [], edges: [] };
let pan             = { x: 0, y: 0 };
let zoom            = 1;
let isPanning       = false;
let panStart        = null;
let physicsNodes    = [];
let animFrame       = null;
let draggingNode    = null;
let dragOrigin      = null;
let nodeMoved       = false;
let nodeMenuTarget  = null;

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildSoulSliders();
  buildActivityGrid();
  initGraph();
  initResize();
  poll();
  setInterval(poll, POLL_MS);
  document.getElementById('send-btn').onclick = sendChat;
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
  document.getElementById('sel-expand-btn').onclick = expandSelected;
  document.getElementById('node-menu-remove').onclick = removeMenuNode;
  document.addEventListener('click', () => { document.getElementById('node-menu').style.display = 'none'; });
});

// ── RESIZE ───────────────────────────────────────────────────
function initResize() {
  let resizing = null;

  ['rh-left','rh-right','rh-chat'].forEach(id => {
    document.getElementById(id).addEventListener('mousedown', e => {
      e.preventDefault();
      const el = e.currentTarget;
      const type = el.dataset.type || 'chat';
      let startVal;
      const root = document.documentElement;
      if (type === 'left')  startVal = parseInt(getComputedStyle(root).getPropertyValue('--sw'));
      if (type === 'right') startVal = parseInt(getComputedStyle(root).getPropertyValue('--pw'));
      if (type === 'chat' || id === 'rh-chat') startVal = parseInt(getComputedStyle(root).getPropertyValue('--ch'));
      const startX = e.clientX, startY = e.clientY;
      resizing = { type: (id === 'rh-chat') ? 'chat' : type, startVal, startX, startY, el };
      el.classList.add('dragging');
      document.body.style.cursor = (id === 'rh-chat') ? 'row-resize' : 'col-resize';
      document.body.style.userSelect = 'none';
    });
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const root = document.documentElement;
    if (resizing.type === 'left') {
      const v = Math.max(180, Math.min(420, resizing.startVal + e.clientX - resizing.startX));
      root.style.setProperty('--sw', v + 'px');
    } else if (resizing.type === 'right') {
      const v = Math.max(200, Math.min(520, resizing.startVal - (e.clientX - resizing.startX)));
      root.style.setProperty('--pw', v + 'px');
    } else {
      const v = Math.max(100, Math.min(window.innerHeight * 0.55, resizing.startVal - (e.clientY - resizing.startY)));
      root.style.setProperty('--ch', v + 'px');
    }
  });

  document.addEventListener('mouseup', () => {
    if (!resizing) return;
    resizing.el.classList.remove('dragging');
    resizing = null;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

// ── POLLING ───────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(`${API}/snapshot`, { cache: 'no-store' });
    if (!res.ok) return;
    state = await res.json();
    applyState(state);
  } catch (_) {}
}

function applyState(s) {
  // Topbar
  document.getElementById('mbti').textContent          = s.mbti_type;
  document.getElementById('state-label').textContent   = s.activity;
  document.getElementById('tick-n').textContent        = s.tick;
  document.getElementById('topbar-uptime').textContent = s.uptime ?? '—';
  document.getElementById('busy').style.display        = s.busy ? 'inline' : 'none';
  if (s.weather) {
    document.getElementById('topbar-weather').textContent = `${s.weather.description} · ${s.weather.temperature_c}°C`;
  }

  // Vitals
  setVital('energy',    s.vitals.energy);
  setVital('social',    s.vitals.social_battery);
  setVital('curiosity', s.vitals.curiosity);

  // World
  document.getElementById('world-season').textContent  = s.season ? `${s.circadian} · ${s.season}` : (s.circadian ?? '—');
  document.getElementById('world-weather').textContent = s.weather
    ? `${s.weather.description}, ${s.weather.temperature_c}°C · ${s.weather.feels_like}`
    : 'weather unknown';

  // Mood
  if (s.affect) {
    const pill  = document.getElementById('mood-pill');
    const color = MOOD_COLORS[s.affect.mood] || '#4a5568';
    pill.textContent        = s.affect.mood;
    pill.style.color        = color;
    pill.style.background   = color + '22';
    pill.style.borderColor  = color + '88';
  }

  // Profile portrait — backend chooses PNG from activity / mood (chloe/avatar.py).
  // Use URL resolution (not string concat) so ports / trailing slashes behave;
  // compare to profileImg.src (browser-normalised) so we always catch real changes.
  const profileImg = document.getElementById('profile-img');
  if (profileImg) {
    const DEFAULT_AVATAR = 'image.webp';
    const apiBase = API.endsWith('/') ? API : `${API}/`;
    if (s.avatar && s.avatar.path) {
      const nextSrc = new URL(s.avatar.path, apiBase).href;
      if (profileImg.src !== nextSrc) {
        profileImg.src = nextSrc;
        profileImg.alt = s.avatar.key || 'Chloe';
      }
    } else {
      const fallbackSrc = new URL(DEFAULT_AVATAR, window.location.href).href;
      if (profileImg.src !== fallbackSrc) {
        profileImg.src = DEFAULT_AVATAR;
        profileImg.alt = 'Chloe';
      }
    }
  }

  // Soul
  updateSoulSliders(s.soul);
  document.getElementById('soul-desc').textContent = s.soul_desc;

  // Interests
  document.getElementById('interests').innerHTML =
    s.interests.map(i => `<span class="interest-tag">${i}</span>`).join('');

  // Activity buttons
  document.querySelectorAll('.act-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.id === s.activity));

  // People — also rebuild person pills in chat bar
  if (s.persons) { renderPeople(s.persons); renderPersonPills(s.persons); }

  // Graph
  mergeGraph(s.graph);

  // Panel
  renderPanel(s);

  // Chat
  renderChat(s.chat);
}

function setVital(key, val) {
  const pct = Math.round(val);
  document.getElementById(`v-${key}`).textContent = `${pct}%`;
  document.getElementById(`b-${key}`).style.width = `${pct}%`;
}

// ── SOUL SLIDERS ─────────────────────────────────────────────
function buildSoulSliders() {
  document.getElementById('soul-sliders').innerHTML = TRAITS.map(t => `
    <div class="soul-slider">
      <div class="soul-header">
        <div class="soul-labels">
          <span id="lbl-${t.key}-l" class="active">${t.left}</span>
          <span id="lbl-${t.key}-r">${t.right}</span>
        </div>
        <span class="soul-val-display" id="sval-${t.key}">50</span>
      </div>
      <div class="slider-track" onclick="onSliderClick(event,'${t.key}')">
        <div class="slider-fill"  id="sf-${t.key}" style="width:50%"></div>
        <div class="slider-thumb" id="st-${t.key}" style="left:50%"></div>
      </div>
    </div>
  `).join('');
}

function updateSoulSliders(soul) {
  TRAITS.forEach(t => {
    const val = soul[t.key];
    document.getElementById(`sf-${t.key}`).style.width  = `${val}%`;
    document.getElementById(`st-${t.key}`).style.left   = `${val}%`;
    document.getElementById(`sval-${t.key}`).textContent = Math.round(val);
    document.getElementById(`lbl-${t.key}-l`).classList.toggle('active', val < 50);
    document.getElementById(`lbl-${t.key}-r`).classList.toggle('active', val >= 50);
  });
}

function onSliderClick(e, trait) {
  const rect = e.currentTarget.getBoundingClientRect();
  const val  = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  fetch(`${API}/soul`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ trait, value: val }) });
}

// ── ACTIVITY GRID ─────────────────────────────────────────────
function buildActivityGrid() {
  document.getElementById('activity-grid').innerHTML = ACTIVITIES.map(a => `
    <button class="act-btn" data-id="${a.id}" onclick="setActivity('${a.id}')">
      <span class="act-icon">${a.icon}</span>${a.label}
    </button>
  `).join('');
}

function setActivity(id) {
  fetch(`${API}/activity`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ activity_id: id }) });
}

// ── PEOPLE ───────────────────────────────────────────────────
function renderPeople(persons) {
  document.getElementById('people-list').innerHTML = persons.map(p => {
    const warmth  = Math.round(p.warmth);
    const contact = Math.round(100 - p.distance);
    const notes   = (p.notes || []).slice(0, 3);
    const noteHtml = notes.length ? `<div class="person-notes">${
      notes.map(n => `<div class="person-note${n.followed_up ? ' followed-up':''}">${n.text}</div>`).join('')
    }</div>` : '';
    const convStr = p.conversation_count ? `${p.conversation_count} conv` : 'no contact';
    return `
      <div class="person-card">
        <div class="person-header">
          <div class="person-name">${p.name}</div>
          <div class="person-meta">${convStr}</div>
        </div>
        <div class="person-bars">
          <div class="person-bar-row">
            <div class="person-bar-label">warmth</div>
            <div class="person-bar-track"><div class="person-bar-fill warmth-fill" style="width:${warmth}%"></div></div>
            <div class="person-meta" style="width:24px;text-align:right">${warmth}</div>
          </div>
          <div class="person-bar-row">
            <div class="person-bar-label">contact</div>
            <div class="person-bar-track"><div class="person-bar-fill contact-fill" style="width:${contact}%"></div></div>
            <div class="person-meta" style="width:24px;text-align:right">${contact}</div>
          </div>
        </div>
        ${noteHtml}
      </div>`;
  }).join('');
}

function renderPersonPills(persons) {
  document.getElementById('person-pills').innerHTML = persons.map(p => `
    <button class="person-pill${activePerson === p.id ? ' active' : ''}"
            data-id="${p.id}" onclick="selectPerson('${p.id}')">${p.name}</button>
  `).join('');
}

function selectPerson(id) {
  activePerson = id;
  document.querySelectorAll('.person-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.id === id));
}

// ── PANEL TABS ────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t =>
    t.classList.toggle('active', t.textContent.trim() === tab));
  if (state) renderPanel(state);
}

function renderPanel(s) {
  const body = document.getElementById('panel-body');
  if (activeTab === 'memory') {
    body.innerHTML = (s.memories || []).map(m => {
      const cls = { dream:'memory-dream', creative:'memory-creative', reflection:'memory-reflection', journal:'memory-journal' }[m.type] || '';
      return `<div class="memory-item ${cls}">
        <div class="memory-meta">${m.type} · w${m.weight.toFixed(2)} · ${(m.tags||[]).join(', ')}</div>
        <div class="memory-text">${m.text}</div>
      </div>`;
    }).join('') || '<div class="log-item">No memories.</div>';

  } else if (activeTab === 'ideas') {
    body.innerHTML = (s.ideas || []).map(i =>
      `<div class="idea-item"><div class="idea-text">${i}</div></div>`
    ).join('') || '<div class="log-item">No ideas yet.</div>';

  } else if (activeTab === 'mind') {
    const wants   = s.wants   || [];
    const beliefs = s.beliefs || [];
    const goals   = s.goals   || [];
    body.innerHTML = `
      <div class="mind-section-title">wants</div>
      ${wants.length ? wants.map(w => `
        <div class="want-item">
          <div class="want-text ${w.resolved?'resolved':''}">${w.resolved?'✓':'◦'} ${w.text}</div>
          <div class="want-tags">${(w.tags||[]).join(' · ')}</div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}
      <div class="mind-section-title" style="margin-top:8px">goals</div>
      ${goals.length ? goals.map(g => `
        <div class="want-item">
          <div class="want-text ${g.resolved?'resolved':''}">${g.resolved?'✓':'→'} ${g.text}</div>
          <div class="want-tags">${(g.tags||[]).join(' · ')}</div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}
      <div class="mind-section-title" style="margin-top:8px">beliefs</div>
      ${beliefs.length ? beliefs.map(b => `
        <div class="belief-item">
          <div class="belief-text">${b.text}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <div class="belief-conf-track" style="flex:1"><div class="belief-conf-fill" style="width:${Math.round(b.confidence*100)}%"></div></div>
            <div style="font-size:8px;color:var(--text3);width:28px">${Math.round(b.confidence*100)}%</div>
          </div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}`;

  } else if (activeTab === 'admin') {
    renderAdmin(s, body);

  } else {
    body.innerHTML = (s.log || []).map(l =>
      `<div class="log-item">${l}</div>`).join('');
  }
}

function renderAdmin(s, body) {
  const v = s.vitals;
  const vitalRows = [
    { key:'energy',    label:'energy',    val: Math.round(v.energy),            color:'var(--blue)',   apiKey:'energy'    },
    { key:'social',    label:'social',    val: Math.round(v.social_battery),    color:'var(--violet)', apiKey:'social'    },
    { key:'curiosity', label:'curiosity', val: Math.round(v.curiosity),         color:'var(--teal)',   apiKey:'curiosity' },
  ];

  const vitalsHtml = vitalRows.map(r => `
    <div class="admin-vital-row">
      <div class="admin-vital-label">${r.label}</div>
      <div class="admin-vital-val">${r.val}</div>
      <button class="admin-btn" onclick="nudgeVital('${r.apiKey}',${r.val},-10)">−</button>
      <div class="admin-vital-bar" style="flex:1"><div class="admin-vital-fill" style="width:${r.val}%;background:${r.color}"></div></div>
      <button class="admin-btn" onclick="nudgeVital('${r.apiKey}',${r.val},+10)">+</button>
    </div>`).join('');

  const currentMood = s.affect?.mood || 'content';
  const moodHtml = MOODS.map(m => `
    <button class="admin-mood-btn ${m === currentMood ? 'active' : ''}"
            style="${m === currentMood ? `color:${MOOD_COLORS[m]}` : ''}"
            onclick="setMood('${m}')">${m}</button>`).join('');

  const soul = s.soul || {};
  const soulHtml = TRAITS.map(t => {
    const val = Math.round(soul[t.key] ?? 50);
    const active = val >= 50 ? t.right : t.left;
    return `
      <div class="admin-soul-row">
        <div class="admin-soul-key">${t.key}</div>
        <div class="admin-soul-num">${val}</div>
        <div class="slider-track" style="flex:1" onclick="onSliderClick(event,'${t.key}')">
          <div class="slider-fill"  style="width:${val}%"></div>
          <div class="slider-thumb" style="left:${val}%"></div>
        </div>
        <div style="font-size:8px;color:var(--gold2);width:14px;text-align:center">${active}</div>
      </div>`;
  }).join('');

  body.innerHTML = `
    <div class="admin-block">
      <div class="admin-block-title">vitals</div>
      ${vitalsHtml}
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">mood</div>
      <div class="admin-mood-grid">${moodHtml}</div>
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">soul</div>
      ${soulHtml}
      <button class="admin-reset-btn" onclick="resetSoulBaseline()">reset baseline</button>
    </div>`;
}

// ── ADMIN ACTIONS ─────────────────────────────────────────────
async function nudgeVital(key, current, delta) {
  const val = Math.max(0, Math.min(100, current + delta));
  await fetch(`${API}/vitals`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ [key]: val }) });
  await poll();
}

async function setMood(mood) {
  await fetch(`${API}/affect`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mood }) });
  await poll();
}

function resetSoulBaseline() {
  // Reset soul back to INFP-ish defaults
  const defaults = { EI:58, SN:62, TF:56, JP:67 };
  Promise.all(Object.entries(defaults).map(([trait, value]) =>
    fetch(`${API}/soul`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ trait, value }) })
  )).then(() => poll());
}

// ── CHAT ─────────────────────────────────────────────────────
let lastChatLen = 0;

function renderChat(messages) {
  if (!messages || messages.length === lastChatLen) return;
  lastChatLen = messages.length;
  const container = document.getElementById('chat-messages');
  container.innerHTML = messages.map(m => `
    <div class="msg ${m.from === 'chloe' ? 'msg-chloe' + (m.autonomous ? ' msg-auto' : '') : 'msg-user'}">
      <div class="msg-meta">${m.from === 'chloe' ? 'chloe' : 'you'} · ${m.time}${m.autonomous ? ' · unprompted' : ''}</div>
      ${m.text}
    </div>`).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg) return;
  input.value = '';

  const container = document.getElementById('chat-messages');
  const now  = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  container.innerHTML += `<div class="msg msg-user"><div class="msg-meta">you (${activePerson}) · ${time}</div>${msg}</div>`;
  container.scrollTop = container.scrollHeight;

  try {
    const res = await fetch(`${API}/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, person_id: activePerson })
    });
    if (!res.ok) {
      container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">error</div>server returned ${res.status}</div>`;
      container.scrollTop = container.scrollHeight;
      return;
    }
    const data = await res.json();
    if (data.queued) {
      container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">chloe · asleep</div>she'll see this when she wakes up</div>`;
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) {
    container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">error</div>can't reach server — is uvicorn running on port 8080?</div>`;
    container.scrollTop = container.scrollHeight;
    return;
  }
  await poll();
}

// ── GRAPH ────────────────────────────────────────────────────
function initGraph() {
  const canvas = document.getElementById('graph-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    pan.x = canvas.width  / 2;
    pan.y = canvas.height / 2;
  }
  resize();
  new ResizeObserver(resize).observe(canvas);

  // ── Mouse events ──────────────────────────────────────────
  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const n = hitNode(e);
    if (n && !n.fixed) {
      draggingNode = n;
      dragOrigin   = { x: e.clientX, y: e.clientY };
      nodeMoved    = false;
      canvas.style.cursor = 'grabbing';
    } else {
      isPanning = true;
      panStart  = { x: e.clientX - pan.x, y: e.clientY - pan.y };
      canvas.style.cursor = 'grabbing';
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (draggingNode) {
      const dx = e.clientX - dragOrigin.x;
      const dy = e.clientY - dragOrigin.y;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) nodeMoved = true;
      draggingNode.x  += dx / zoom;
      draggingNode.y  += dy / zoom;
      draggingNode.vx  = 0;
      draggingNode.vy  = 0;
      dragOrigin = { x: e.clientX, y: e.clientY };
    } else if (isPanning) {
      pan.x = e.clientX - panStart.x;
      pan.y = e.clientY - panStart.y;
    } else {
      canvas.style.cursor = hitNode(e) ? 'pointer' : 'grab';
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (draggingNode && !nodeMoved) {
      handleNodeClick(draggingNode);
    }
    draggingNode = null;
    isPanning    = false;
    canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('mouseleave', () => {
    draggingNode = null;
    isPanning    = false;
    canvas.style.cursor = 'grab';
  });

  // Zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoom = Math.max(0.3, Math.min(3, zoom - e.deltaY * 0.001));
  }, { passive: false });

  // Right-click: node context menu
  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    const n = hitNode(e);
    if (n && !n.fixed) {
      nodeMenuTarget = n;
      const menu = document.getElementById('node-menu');
      document.getElementById('node-menu-label').textContent = n.label;
      menu.style.left    = e.clientX + 'px';
      menu.style.top     = e.clientY + 'px';
      menu.style.display = 'block';
      e.stopPropagation();
    }
  });

  // Physics + render loop
  (function loop() { stepPhysics(); draw(ctx, canvas); requestAnimationFrame(loop); })();
}

function hitNode(e) {
  const rect = document.getElementById('graph-canvas').getBoundingClientRect();
  const mx   = (e.clientX - rect.left  - pan.x) / zoom;
  const my   = (e.clientY - rect.top   - pan.y) / zoom;
  for (const n of physicsNodes) {
    const r  = nodeRadius(n) + 4;
    const dx = n.x - mx, dy = n.y - my;
    if (dx*dx + dy*dy < r*r) return n;
  }
  return null;
}

function handleNodeClick(n) {
  if (selectedNodeId === n.id) {
    expandNode(n.id);
  } else {
    selectedNodeId = n.id;
    const info = document.getElementById('sel-info');
    document.getElementById('sel-label').textContent = n.label;
    document.getElementById('sel-note').textContent  = n.note || '';
    info.classList.add('visible');
  }
}

function mergeGraph(newGraph) {
  if (!newGraph?.nodes) return;
  graph = newGraph;
  const existing = {};
  physicsNodes.forEach(n => existing[n.id] = n);
  physicsNodes = graph.nodes.map(n => {
    if (existing[n.id]) return { ...n, x: existing[n.id].x, y: existing[n.id].y, vx: existing[n.id].vx||0, vy: existing[n.id].vy||0 };
    const parent = existing[n.parent];
    const angle  = Math.random() * Math.PI * 2;
    const dist   = 120 + Math.random() * 40;
    return { ...n, x: parent ? parent.x + Math.cos(angle)*dist : (Math.random()-.5)*300, y: parent ? parent.y + Math.sin(angle)*dist : (Math.random()-.5)*300, vx:0, vy:0 };
  });
}

function stepPhysics() {
  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);
  physicsNodes.forEach(n => { n.fx = 0; n.fy = 0; });

  // Repulsion
  for (let i = 0; i < physicsNodes.length; i++) {
    for (let j = i+1; j < physicsNodes.length; j++) {
      const a = physicsNodes[i], b = physicsNodes[j];
      const dx = b.x-a.x, dy = b.y-a.y;
      const d  = Math.sqrt(dx*dx+dy*dy) || 0.1;
      const minD = 80;
      if (d < minD) {
        const f = (minD-d)/d*0.5;
        if (!a.fixed) { a.fx -= dx*f; a.fy -= dy*f; }
        if (!b.fixed) { b.fx += dx*f; b.fy += dy*f; }
      }
    }
  }

  // Springs (edges)
  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a||!b) return;
    const dx = b.x-a.x, dy = b.y-a.y;
    const d  = Math.sqrt(dx*dx+dy*dy)||0.1;
    const f  = (d-130)/d*0.05;
    if (!a.fixed) { a.fx += dx*f; a.fy += dy*f; }
    if (!b.fixed) { b.fx -= dx*f; b.fy -= dy*f; }
  });

  // Gravity to centre
  physicsNodes.forEach(n => { if (!n.fixed) { n.fx -= n.x*0.006; n.fy -= n.y*0.006; } });

  // Integrate (skip dragged node)
  physicsNodes.forEach(n => {
    if (n.fixed || n === draggingNode) return;
    n.vx = (n.vx + n.fx) * 0.82;
    n.vy = (n.vy + n.fy) * 0.82;
    n.x += n.vx;
    n.y += n.vy;
  });
}

function draw(ctx, canvas) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(pan.x, pan.y);
  ctx.scale(zoom, zoom);

  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);

  // Edges
  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a||!b) return;
    const sel = e.from === selectedNodeId || e.to === selectedNodeId;
    const col = sel ? (DEPTH_COLORS[nodeMap[e.to]?.depth||0]||'#c8a96e') : '#1c2028';
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle = col; ctx.globalAlpha = sel ? 0.6 : 0.35;
    ctx.lineWidth = sel ? 1.2 : 0.6; ctx.stroke(); ctx.globalAlpha = 1;
  });

  // Nodes
  physicsNodes.forEach(n => {
    const r   = nodeRadius(n);
    const col = DEPTH_COLORS[Math.min(n.depth, DEPTH_COLORS.length-1)];
    const sel = n.id === selectedNodeId;
    const dragged = n === draggingNode;

    if (sel || dragged) {
      ctx.beginPath(); ctx.arc(n.x, n.y, r+8, 0, Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.globalAlpha = dragged ? 0.5 : 0.25;
      ctx.stroke(); ctx.globalAlpha = 1;
    }
    if (n.is_new) {
      ctx.beginPath(); ctx.arc(n.x, n.y, r*1.8, 0, Math.PI*2);
      ctx.fillStyle = col; ctx.globalAlpha = 0.15; ctx.fill(); ctx.globalAlpha = 1;
    }

    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.globalAlpha = n.depth === 0 ? 0.25 : 0.15;
    ctx.fill(); ctx.globalAlpha = 1;

    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.strokeStyle = col; ctx.lineWidth = (sel||dragged) ? 1.5 : 0.7;
    ctx.globalAlpha = (sel||dragged) ? 1 : 0.5; ctx.stroke(); ctx.globalAlpha = 1;

    ctx.fillStyle = col; ctx.globalAlpha = (sel||dragged) ? 1 : 0.65;
    ctx.font = `${n.depth===0?500:400} ${n.depth===0?10:8}px 'DM Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(n.label.toUpperCase(), n.x, n.y+r+11);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function nodeRadius(n) {
  if (n.depth === 0) return 26;
  return Math.max(7, 18 * (n.strength||0.8) * (1 - n.depth*0.1));
}

async function expandNode(nodeId) {
  document.getElementById('sel-info').classList.remove('visible');
  selectedNodeId = null;
  await fetch(`${API}/expand`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ node_id: nodeId }) });
  await poll();
}

function expandSelected() { if (selectedNodeId) expandNode(selectedNodeId); }

function removeMenuNode() {
  if (!nodeMenuTarget) return;
  const id = nodeMenuTarget.id;
  document.getElementById('node-menu').style.display = 'none';
  nodeMenuTarget = null;
  // Remove client-side immediately
  physicsNodes = physicsNodes.filter(n => n.id !== id);
  graph.nodes  = (graph.nodes  || []).filter(n => n.id !== id);
  graph.edges  = (graph.edges  || []).filter(e => e.from !== id && e.to !== id);
  if (selectedNodeId === id) {
    selectedNodeId = null;
    document.getElementById('sel-info').classList.remove('visible');
  }
  // Persist server-side
  fetch(`${API}/graph/${id}`, { method:'DELETE' });
}
</script>
</body>
