<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── PALETTE — derived from Chloe's image (pink hair, mint sweater, sage leaf) */
:root {
  --sw: 260px;
  --bg:       #07080c;
  --bg2:      #0d0e14;
  --bg3:      #13141e;
  --border:   #1c1e2c;
  --border2:  #272a3e;
  --text:     #c0c8e8;
  --text2:    #8088b0;
  --text3:    #505880;
  --gold:     #d4849a;   /* soft pink — main accent */
  --gold2:    #8a4a62;   /* deep pink */
  --blue:     #5aaa88;   /* mint — sweater */
  --teal:     #4a9870;   /* sage green — leaf */
  --violet:   #8a5a72;   /* dusty rose */
  --rose:     #b06080;   /* warm rose */
  --sage:     #4a8a62;   /* forest green */
  --font-mono:  'DM Mono', monospace;
  --font-serif: 'Cormorant Garamond', serif;
  --r: 6px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  overflow: hidden;
}

button, .mtab, .person-pill, .sidebar-label, .topbar-name, .topbar-stat {
  user-select: none;
}

/* ── GRID ──────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: var(--sw) 1fr;
  grid-template-rows: 44px 1fr;
  height: 100vh;
}

.topbar  { grid-column: 1 / -1; grid-row: 1; background: var(--bg2); display: flex; align-items: center; padding: 0 16px; gap: 14px; border-bottom: 1px solid var(--border); }
.sidebar { grid-column: 1; grid-row: 2; background: var(--bg2); overflow-y: auto; border-right: 1px solid var(--border); }
.main    { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

/* ── TOPBAR ────────────────────────────────────────────────── */
.topbar-name { font-family: var(--font-serif); font-size: 18px; font-weight: 300; font-style: italic; color: var(--gold); letter-spacing: 2px; }
.topbar-sep  { color: var(--text3); }
.topbar-stat { font-size: 9px; letter-spacing: 1px; color: var(--text3); }
.topbar-stat span { color: var(--text2); }
.busy-indicator { font-size: 9px; color: var(--gold2); letter-spacing: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.spacer { flex: 1; }

/* ── PROFILE CARD ──────────────────────────────────────────── */
.profile-card { position: relative; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.profile-img  { width: 100%; height: 280px; object-fit: cover; object-position: center 10%; display: block; filter: saturate(0.80) brightness(0.92); }
.profile-mood-badge { position: absolute; top: 12px; right: 12px; font-size: 7px; letter-spacing: 2px; text-transform: uppercase; border-radius: 10px; padding: 3px 10px; border: 1px solid currentColor; background: rgba(7,8,12,0.55); backdrop-filter: blur(8px); transition: color 2s, background 2s, border-color 2s; }
.profile-info { padding: 11px 14px 12px; background: var(--bg2); }
.profile-name { font-family: var(--font-mono); font-size: 15px; font-weight: 300; color: #ccd0ea; letter-spacing: 4px; text-transform: uppercase; line-height: 1; margin-bottom: 7px; }
.profile-meta { display: flex; align-items: center; gap: 8px; }
.profile-activity { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-top: 5px; }
.mbti-pill { font-size: 8px; letter-spacing: 3px; color: #7a80aa; border: 1px solid #2a2a45; border-radius: 20px; padding: 2px 10px; }
.state-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 6px var(--teal); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── SIDEBAR SECTIONS ──────────────────────────────────────── */
.section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.section-title { font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }

/* Vitals */
.vital { margin-bottom: 9px; }
.vital-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
.vital-val { color: var(--text); }
.bar-track { height: 2px; background: var(--bg3); border-radius: 1px; }
.bar-fill  { height: 100%; border-radius: 1px; transition: width 1.5s ease; }
.bar-energy    { background: var(--blue);   box-shadow: 0 0 4px var(--blue); }
.bar-social    { background: var(--violet); box-shadow: 0 0 4px var(--violet); }
.bar-curiosity { background: var(--teal);   box-shadow: 0 0 4px var(--teal); }

/* Soul */
.soul-slider { margin-bottom: 12px; }
.soul-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.soul-labels { display: flex; gap: 6px; font-size: 8px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.soul-labels span.active { color: var(--gold2); }
.soul-val-display { font-size: 9px; color: var(--text3); }
.slider-track { height: 4px; background: var(--bg3); border-radius: 2px; position: relative; cursor: pointer; }
.slider-fill  { position: absolute; top: 0; height: 100%; border-radius: 2px; background: linear-gradient(to right, var(--gold2), var(--gold)); transition: width 1.2s ease; }
.slider-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 8px; height: 8px; border-radius: 50%; background: var(--gold); transition: left 1.2s ease; box-shadow: 0 0 8px var(--gold); }
.soul-desc { font-family: var(--font-serif); font-size: 13px; font-style: italic; color: var(--text2); line-height: 1.7; padding: 8px 0 2px; }
.world-line { font-size: 11px; color: var(--text2); line-height: 1.8; }

/* Interests */
.interest-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
.interest-tag { font-size: 8px; letter-spacing: 1px; color: var(--text2); border: 1px solid var(--border2); border-radius: 12px; padding: 2px 8px; cursor: default; transition: all 0.2s; }
.interest-tag:hover { border-color: var(--gold2); color: var(--gold); }

/* Activity — display only (no buttons) */
.activity-display {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--r);
  background: var(--bg3); border: 1px solid var(--border2);
}
.activity-display-icon  { font-size: 16px; }
.activity-display-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }

/* ── MAIN TAB BAR ──────────────────────────────────────────── */
.main-tabs {
  display: flex;
  align-items: stretch;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 4px;
}
.mtab {
  padding: 0 18px;
  height: 38px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  font-family: var(--font-mono);
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}
.mtab:hover { color: var(--text2); }
.mtab.active { color: var(--gold); border-bottom-color: var(--gold2); }
.mtab-spacer { flex: 1; }
.mtab-dim { opacity: 0.6; }

/* ── CONTENT AREA ──────────────────────────────────────────── */
.main-content {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.page {
  display: none;
  position: absolute;
  inset: 0;
}
.page.active              { display: flex; flex-direction: column; }
#page-graph.active        { display: block; overflow: hidden; }
#page-panel.active        { display: block; overflow-y: auto; }
#page-people.active       { display: block; overflow-y: auto; }

/* ── PANEL PAGE ────────────────────────────────────────────── */
.panel-body { padding: 16px 20px; }

/* Memory */
.memory-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.memory-meta { font-size: 8px; color: var(--text3); letter-spacing: 1px; margin-bottom: 4px; }
.memory-text { font-size: 10px; color: var(--text2); line-height: 1.75; }
.memory-item:hover .memory-text { color: var(--text); }
.memory-dream      { border-left: 2px solid var(--violet); padding-left: 10px; }
.memory-creative   { border-left: 2px solid var(--gold2);  padding-left: 10px; }
.memory-reflection { border-left: 2px solid var(--sage);   padding-left: 10px; }
.memory-journal    { border-left: 2px solid var(--blue);   padding-left: 10px; }

/* Ideas */
.idea-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
.idea-text { font-size: 10px; color: #4a6a8a; line-height: 1.75; }
.idea-text::before { content: "→ "; color: var(--text3); }

/* Mind */
.mind-section-title { font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text2); padding: 14px 0 6px; }
.want-item  { padding: 7px 0; border-bottom: 1px solid var(--border); }
.want-text  { font-size: 10px; color: var(--text2); line-height: 1.7; }
.want-text.resolved { color: var(--text3); text-decoration: line-through; opacity: 0.5; }
.want-tags  { font-size: 8px; color: var(--text3); letter-spacing: 1px; margin-top: 3px; }
.belief-item { padding: 7px 0; border-bottom: 1px solid var(--border); }
.belief-text { font-size: 10px; color: var(--text2); line-height: 1.7; font-style: italic; }
.belief-conf-track { height: 2px; background: var(--bg3); border-radius: 1px; margin-top: 5px; }
.belief-conf-fill  { height: 100%; border-radius: 1px; background: var(--rose); transition: width 1.5s ease; }

/* Log */
.log-item { padding: 5px 0; font-size: 9px; color: var(--text3); line-height: 1.5; border-bottom: 1px solid var(--border); }
.log-item:first-child { color: var(--text2); }

/* ── PEOPLE PAGE ───────────────────────────────────────────── */
.people-page { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.person-full-card {
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--bg2);
  transition: border-color 0.2s;
}
.person-full-card:hover { border-color: var(--border2); }
.person-full-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; cursor: pointer; transition: background 0.15s;
}
.person-full-header:hover { background: var(--bg3); }
.person-full-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg3); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.person-full-info { flex: 1; min-width: 0; }
.person-full-name { font-size: 13px; color: var(--text); letter-spacing: 1px; margin-bottom: 2px; }
.person-full-summary { font-size: 8px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; }
.person-full-warmth-mini {
  width: 60px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; flex-shrink: 0;
}
.person-full-warmth-mini-fill { height: 100%; border-radius: 1px; background: var(--gold2); transition: width 0.6s ease; }
.person-chevron { font-size: 8px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.person-chevron.open { transform: rotate(180deg); }

.person-full-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease, padding 0.2s ease;
  border-top: 0px solid transparent;
}
.person-full-body.open {
  max-height: 600px;
  border-top: 1px solid var(--border);
}
.person-full-body-inner { padding: 16px; }

.person-detail-section { margin-bottom: 14px; }
.person-detail-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.person-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.person-stat-key { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); width: 52px; }
.person-stat-bar { flex: 1; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
.person-stat-fill { height: 100%; border-radius: 1px; transition: width 0.6s ease; }
.person-warmth-fill  { background: var(--gold); }
.person-contact-fill { background: var(--blue); }
.person-stat-num { font-size: 9px; color: var(--text2); width: 28px; text-align: right; }

.person-notes-list { display: flex; flex-direction: column; gap: 6px; }
.person-note-entry {
  font-size: 9px; color: var(--text2); font-style: italic;
  line-height: 1.6; padding: 6px 10px;
  border-left: 2px solid var(--border2);
  border-radius: 0 3px 3px 0;
  background: var(--bg3);
}
.person-note-entry.followed-up { color: var(--text3); text-decoration: line-through; border-left-color: var(--border); }
.person-empty { font-size: 9px; color: var(--text3); font-style: italic; }
.person-conv-count { font-size: 10px; color: var(--text2); }

/* ── GRAPH PAGE ────────────────────────────────────────────── */
#graph-canvas { width: 100%; height: 100%; display: block; }
.graph-overlay { position: absolute; bottom: 12px; left: 14px; font-size: 8px; color: var(--text3); letter-spacing: 2px; pointer-events: none; }
.graph-selected-info { position: absolute; top: 14px; right: 14px; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--r); padding: 12px 16px; max-width: 220px; display: none; }
.graph-selected-info.visible { display: block; }
.sel-label { font-size: 11px; color: var(--gold); margin-bottom: 5px; }
.sel-note  { font-size: 9px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.sel-expand { font-size: 8px; letter-spacing: 2px; color: var(--gold2); border: 1px solid #2a1020; border-radius: 3px; padding: 4px 10px; cursor: pointer; background: none; font-family: var(--font-mono); }
.sel-expand:hover { color: var(--gold); border-color: var(--gold2); }

/* ── ADMIN ─────────────────────────────────────────────────── */
.admin-block { margin-bottom: 4px; }
.admin-block-title { font-size: 8px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text2); padding: 12px 0 8px; }
.admin-vital-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.admin-vital-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); width: 52px; }
.admin-vital-val   { font-size: 9px; color: var(--text); width: 26px; text-align: right; }
.admin-vital-bar   { flex: 1; height: 2px; background: var(--bg3); border-radius: 1px; overflow: hidden; }
.admin-vital-fill  { height: 100%; border-radius: 1px; transition: width 1s ease; }
.admin-btn { padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 10px; cursor: pointer; transition: all 0.15s; }
.admin-btn:hover { border-color: var(--gold2); color: var(--gold); }
.admin-mood-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.admin-mood-btn   { padding: 6px 8px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-align: center; cursor: pointer; transition: all 0.2s; }
.admin-mood-btn:hover  { border-color: var(--border2); color: var(--text); }
.admin-mood-btn.active { border-color: currentColor; background: color-mix(in srgb, currentColor 12%, transparent); }
.admin-soul-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.admin-soul-key { font-size: 8px; letter-spacing: 2px; color: var(--text2); width: 20px; text-align: center; }
.admin-soul-num { font-size: 9px; color: var(--text3); width: 28px; text-align: right; }
.admin-reset-btn { margin-top: 6px; width: 100%; padding: 7px; border-radius: var(--r); border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.admin-reset-btn:hover { border-color: var(--gold2); color: var(--gold); }
.admin-cocaine-btn { margin-bottom: 4px; width: 100%; padding: 10px; border-radius: var(--r); border: 1px solid var(--border2); background: transparent; color: var(--text3); font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.25s; }
.admin-cocaine-btn:hover { border-color: #fff; color: #fff; }
.admin-cocaine-btn.active { border-color: #fff; color: #111; background: #fff; box-shadow: 0 0 18px rgba(255,255,255,0.45); letter-spacing: 4px; }
.admin-divider { height: 1px; background: var(--border); margin: 4px 0 10px; }
.admin-act-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.admin-act-btn { padding: 7px 5px; border-radius: var(--r); border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: var(--font-mono); font-size: 8px; letter-spacing: 1px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.admin-act-btn:hover  { border-color: var(--border2); color: var(--text); }
.admin-act-btn.active { border-color: var(--gold2); color: var(--gold); background: rgba(212,132,154,0.08); }
.admin-act-icon { font-size: 13px; }

/* ── FLOATING CHAT BUBBLE ──────────────────────────────────── */
.chat-bubble-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  width: 54px; height: 54px; border-radius: 50%;
  border: 1px solid var(--gold2);
  background: var(--bg2);
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 1px var(--border2);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  padding: 0;
}
.chat-bubble-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 6px 28px rgba(0,0,0,0.7), 0 0 0 1px var(--gold2);
}
.chat-bubble-btn img {
  width: 100%; height: 100%; object-fit: cover; object-position: center 10%;
  filter: saturate(0.8) brightness(0.9);
  border-radius: 50%;
}
.chat-bubble-btn .bubble-icon {
  font-size: 20px; color: var(--gold2);
}
.chat-bubble-notif {
  position: absolute; top: 0; right: 0;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--rose); border: 2px solid var(--bg);
  display: none;
}
.chat-bubble-notif.show { display: block; }

.chat-panel {
  position: fixed; bottom: 88px; right: 24px; z-index: 199;
  width: 640px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 12px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  overflow: hidden;
  transform: scale(0.94) translateY(12px);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.22s ease, opacity 0.22s ease;
  max-height: calc(200vh - 128px);
}
.chat-panel.open {
  transform: scale(1) translateY(0);
  opacity: 1;
  pointer-events: all;
}

.chat-panel-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-panel-name {
  font-family: var(--font-serif); font-style: italic;
  font-size: 14px; color: var(--gold); letter-spacing: 1px;
  flex: 1;
}
.person-pills { display: flex; gap: 4px; }
.person-pill {
  padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); font-family: var(--font-mono);
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.person-pill:hover  { color: var(--text); }
.person-pill.active { border-color: var(--gold2); color: var(--gold); background: rgba(212,132,154,0.07); }
.chat-panel-close {
  background: none; border: none; color: var(--text2); font-size: 14px;
  cursor: pointer; padding: 2px 4px; line-height: 1;
  transition: color 0.15s;
}
.chat-panel-close:hover { color: var(--text); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 320px;
  max-height: 520px;
}
.chat-messages::-webkit-scrollbar { width: 2px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); }

.msg { max-width: 82%; padding: 8px 12px; border-radius: 10px; font-size: 11px; line-height: 1.6; }
.msg-chloe { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border2); border-radius: 10px 10px 10px 2px; color: var(--text); }
.msg-user  { align-self: flex-end;   background: #0d0f1a;   border: 1px solid #1e2030;  border-radius: 10px 10px 2px 10px; color: #6870a0; }
.msg-auto  { border-color: var(--gold2); }
.msg-meta  { font-size: 7px; color: var(--text3); letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
.msg-queued { opacity: 0.45; font-style: italic; }

.chat-panel-input {
  flex-shrink: 0; border-top: 1px solid var(--border);
  padding: 8px 12px; display: flex; align-items: center; gap: 8px;
}
.chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 7px 10px; color: var(--text); font-family: var(--font-mono); font-size: 11px; outline: none; transition: border-color 0.2s; }
.chat-input:focus { border-color: var(--gold2); }
.chat-input::placeholder { color: var(--text3); }
.send-btn { padding: 7px 12px; background: rgba(212,132,154,0.08); border: 1px solid var(--gold2); border-radius: var(--r); color: var(--gold2); font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.send-btn:hover { background: rgba(212,132,154,0.15); color: var(--gold); }

/* ── NODE CONTEXT MENU ─────────────────────────────────────── */
.node-menu {
  position: fixed; display: none; z-index: 100;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  min-width: 120px;
}
.node-menu-label { font-size: 9px; color: var(--gold); letter-spacing: 1px; padding: 3px 6px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.node-menu-btn { display: block; width: 100%; padding: 6px 8px; background: none; border: none; color: var(--text2); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-align: left; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
.node-menu-btn:hover { background: var(--border); color: var(--rose); }

/* ── SCROLLBARS ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<div class="shell" id="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <span class="topbar-name">Chloe</span>
    <span class="topbar-sep">·</span>
    <span class="topbar-stat">uptime <span id="topbar-uptime">—</span></span>
    <span class="topbar-stat">tick <span id="tick-n">0</span></span>
    <span class="busy-indicator" id="busy" style="display:none">thinking···</span>
    <span class="spacer"></span>
    <span class="topbar-stat" id="topbar-weather"></span>
    <span id="poll-dot" title="last refresh" style="width:10px;height:10px;border-radius:50%;background:#444;display:inline-block"></span>
  </header>

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">

    <div class="profile-card">
      <img class="profile-img" id="profile-img" src="" alt="Chloe" style="display:none">
      <div class="profile-mood-badge" id="mood-pill">content</div>
      <div class="profile-info">
        <div class="profile-name">Chloe</div>
        <div class="profile-meta">
          <span class="mbti-pill" id="mbti">INFP</span>
          <span class="state-dot"></span>
        </div>
        <div class="profile-activity" id="state-label">Resting</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">vitals</div>
      <div class="vital">
        <div class="vital-row"><span>energy</span><span class="vital-val" id="v-energy">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-energy" id="b-energy" style="width:0%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>social</span><span class="vital-val" id="v-social">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-social" id="b-social" style="width:0%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>curiosity</span><span class="vital-val" id="v-curiosity">—</span></div>
        <div class="bar-track"><div class="bar-fill bar-curiosity" id="b-curiosity" style="width:0%"></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">world</div>
      <div class="world-line" id="world-season">—</div>
      <div class="world-line" id="world-weather">—</div>
    </div>

    <div class="section">
      <div class="section-title">soul</div>
      <div id="soul-sliders"></div>
      <div class="soul-desc" id="soul-desc">—</div>
    </div>

    <div class="section">
      <div class="section-title">interests</div>
      <div class="interest-cloud" id="interests"></div>
    </div>

    <div class="section">
      <div class="section-title">activity</div>
      <div class="activity-display" id="activity-display">
        <span class="activity-display-icon" id="activity-icon">🛋️</span>
        <span class="activity-display-label" id="activity-label">Rest</span>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TAB BAR -->
    <nav class="main-tabs">
      <button class="mtab active" data-tab="graph"  onclick="switchTab('graph')">graph</button>
      <button class="mtab"        data-tab="memory" onclick="switchTab('memory')">memory</button>
      <button class="mtab"        data-tab="mind"   onclick="switchTab('mind')">mind</button>
      <button class="mtab"        data-tab="ideas"  onclick="switchTab('ideas')">ideas</button>
      <button class="mtab"        data-tab="people" onclick="switchTab('people')">people</button>
      <button class="mtab"        data-tab="log"    onclick="switchTab('log')">log</button>
      <span class="mtab-spacer"></span>
      <button class="mtab mtab-dim" data-tab="admin" onclick="switchTab('admin')">admin</button>
    </nav>

    <!-- CONTENT AREA -->
    <div class="main-content">

      <!-- Panel page: memory / mind / ideas / log / admin -->
      <div id="page-panel" class="page">
        <div class="panel-body" id="panel-body"></div>
      </div>

      <!-- People page -->
      <div id="page-people" class="page">
        <div class="people-page" id="people-page-body"></div>
      </div>

      <!-- Graph page -->
      <div id="page-graph" class="page active">
        <canvas id="graph-canvas"></canvas>
        <div class="graph-overlay">drag · right-click remove · scroll zoom · drag pan</div>
        <div class="graph-selected-info" id="sel-info">
          <div class="sel-label" id="sel-label"></div>
          <div class="sel-note"  id="sel-note"></div>
          <div class="sel-hits"  id="sel-hits" style="font-size:8px;letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:none"></div>
          <button class="sel-expand" id="sel-expand-btn">expand</button>
        </div>
      </div>

    </div>

  </main>

</div>

<!-- FLOATING CHAT BUBBLE -->
<button class="chat-bubble-btn" id="chat-bubble-btn" onclick="toggleChat()">
  <img id="bubble-avatar" src="" alt="" style="display:none">
  <span class="bubble-icon" id="bubble-icon">💬</span>
  <span class="chat-bubble-notif" id="chat-notif"></span>
</button>

<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-name">Chloe</span>
    <div class="person-pills" id="person-pills"></div>
    <button class="chat-panel-close" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-panel-input">
    <input class="chat-input" id="chat-input" placeholder="say something…" autocomplete="off" />
    <button class="send-btn" id="send-btn">→</button>
  </div>
</div>

<!-- NODE CONTEXT MENU -->
<div class="node-menu" id="node-menu">
  <div class="node-menu-label" id="node-menu-label"></div>
  <button class="node-menu-btn" id="node-menu-remove">remove node</button>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const API     = 'http://localhost:8000';
const POLL_MS = 4000;

const MOOD_COLORS = {
  content:    '#5a9870', restless:   '#8a7a4a', irritable:  '#8a4a4a',
  melancholic:'#5a6a8a', curious:    '#4a9870', serene:     '#5aaa88',
  energized:  '#d4849a', lonely:     '#8a5a72',
};
const MOODS = Object.keys(MOOD_COLORS);

const ACTIVITIES = [
  { id:'sleep',   icon:'🌙', label:'Sleep'   },
  { id:'dream',   icon:'💭', label:'Dream'   },
  { id:'rest',    icon:'🛋️', label:'Rest'    },
  { id:'read',    icon:'🔍', label:'Read'    },
  { id:'think',   icon:'🧠', label:'Think'   },
  { id:'message', icon:'💬', label:'Message' },
  { id:'create',  icon:'✨', label:'Create'  },
];

const TRAITS = [
  { key:'EI', left:'E', right:'I' },
  { key:'SN', left:'S', right:'N' },
  { key:'TF', left:'T', right:'F' },
  { key:'JP', left:'J', right:'P' },
];

const DEPTH_COLORS = ['#d4849a','#5aaa88','#8a5a72','#4a9870','#b06080','#8a7a6a'];

// ── STATE ────────────────────────────────────────────────────
let state        = null;
let activeTab    = 'graph';
let activePerson = 'teo';
let chatOpen     = false;
let prevMsgCount = 0;
let expandedPersons = new Set();

// Soul drift tracking — compare against value from ~30s ago to show trend arrows
let soulHistory  = [];   // [{EI, SN, TF, JP}, ...], max 8 entries (~32s at 4s polls)

// Graph
let selectedNodeId  = null;
let graph           = { nodes: [], edges: [] };
let pan             = { x: 0, y: 0 };
let zoom            = 1;
let isPanning       = false;
let panStart        = null;
let physicsNodes    = [];
let animFrame       = null;
let draggingNode    = null;
let dragOrigin      = null;
let nodeMoved       = false;
let nodeMenuTarget  = null;
let panInitialized  = false;

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildSoulSliders();
  initGraph();
  poll();
  setInterval(poll, POLL_MS);
  document.getElementById('send-btn').onclick = sendChat;
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
  document.getElementById('sel-expand-btn').onclick = expandSelected;
  document.getElementById('node-menu-remove').onclick = removeMenuNode;
  document.addEventListener('click', e => {
    if (!e.target.closest('#node-menu')) document.getElementById('node-menu').style.display = 'none';
    // Close chat panel when clicking outside of it and outside the bubble button
    if (chatOpen && !e.target.closest('#chat-panel') && !e.target.closest('#chat-bubble-btn')) {
      toggleChat();
    }
  });
});

// ── POLLING ───────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(`${API}/snapshot`, { cache: 'no-store' });
    if (!res.ok) return;
    state = await res.json();
    applyState(state);
    const dot = document.getElementById('poll-dot');
    dot.style.transition = 'none';
    dot.style.background = '#5aaa88';
    dot.style.boxShadow  = '0 0 6px #5aaa88';
    setTimeout(() => {
      dot.style.transition = 'background 0.8s, box-shadow 0.8s';
      dot.style.background = '#444';
      dot.style.boxShadow  = 'none';
    }, 120);
  } catch (_) {
    const dot = document.getElementById('poll-dot');
    if (dot) { dot.style.background = '#e74c3c'; dot.style.boxShadow = 'none'; }
  }
}

function applyState(s) {
  // Topbar
  document.getElementById('mbti').textContent          = s.mbti_type;
  document.getElementById('state-label').textContent   = s.activity;
  document.getElementById('tick-n').textContent        = s.tick;
  document.getElementById('topbar-uptime').textContent = s.uptime ?? '—';
  document.getElementById('busy').style.display        = s.busy ? 'inline' : 'none';
  if (s.weather) {
    document.getElementById('topbar-weather').textContent = `${s.weather.description} · ${s.weather.temperature_c}°C`;
  }

  // Vitals
  setVital('energy',    s.vitals.energy);
  setVital('social',    s.vitals.social_battery);
  setVital('curiosity', s.vitals.curiosity);

  // World
  document.getElementById('world-season').textContent  = s.season ? `${s.circadian} · ${s.season}` : (s.circadian ?? '—');
  document.getElementById('world-weather').textContent = s.weather
    ? `${s.weather.description}, ${s.weather.temperature_c}°C · ${s.weather.feels_like}`
    : 'weather unknown';

  // Mood
  if (s.affect) {
    const pill  = document.getElementById('mood-pill');
    const color = MOOD_COLORS[s.affect.mood] || '#4a5078';
    pill.textContent        = s.affect.mood;
    pill.style.color        = color;
    pill.style.background   = color + '22';
    pill.style.borderColor  = color + '88';
  }

  // Activity display (read-only)
  const act = ACTIVITIES.find(a => a.id === s.activity);
  if (act) {
    document.getElementById('activity-icon').textContent  = act.icon;
    document.getElementById('activity-label').textContent = act.label;
  }

  // Profile portrait (served via API)
  const profileImg = document.getElementById('profile-img');
  const bubbleAvatar = document.getElementById('bubble-avatar');
  const bubbleIcon   = document.getElementById('bubble-icon');
  if (profileImg) {
    const apiBase = API.endsWith('/') ? API : `${API}/`;
    if (s.avatar && s.avatar.path) {
      const nextSrc = new URL(s.avatar.path, apiBase).href;
      if (profileImg.src !== nextSrc) {
        profileImg.src = nextSrc;
        profileImg.alt = s.avatar.key || 'Chloe';
        profileImg.style.display = 'block';
        bubbleAvatar.src = nextSrc;
        bubbleAvatar.style.display = 'block';
        bubbleIcon.style.display = 'none';
      }
    } else {
      profileImg.style.display = 'none';
      bubbleAvatar.style.display = 'none';
      bubbleIcon.style.display = 'block';
    }
  }

  // Soul
  updateSoulSliders(s.soul);
  document.getElementById('soul-desc').textContent = s.soul_desc;

  // Interests
  document.getElementById('interests').innerHTML =
    s.interests.map(i => `<span class="interest-tag">${i}</span>`).join('');

  // People (page + pills)
  if (s.persons) {
    renderPersonPills(s.persons);
    if (activeTab === 'people') renderPeoplePage(s.persons);
  }

  // Graph data
  mergeGraph(s.graph);

  // Chat — notification dot
  const msgs = (s.chat || []).filter(m => !m.person_id || m.person_id === activePerson);
  if (!chatOpen && msgs.length > prevMsgCount) {
    document.getElementById('chat-notif').classList.add('show');
  }
  prevMsgCount = msgs.length;
  renderChat(s.chat);

  // Panel (skip when on graph or people — those update themselves above)
  if (activeTab !== 'graph' && activeTab !== 'people') renderPanel(s);
}

function setVital(key, val) {
  const pct = Math.round(val);
  document.getElementById(`v-${key}`).textContent = `${pct}%`;
  document.getElementById(`b-${key}`).style.width = `${pct}%`;
}

// ── SOUL SLIDERS ─────────────────────────────────────────────
function buildSoulSliders() {
  document.getElementById('soul-sliders').innerHTML = TRAITS.map(t => `
    <div class="soul-slider">
      <div class="soul-header">
        <div class="soul-labels">
          <span id="lbl-${t.key}-l" class="active">${t.left}</span>
          <span id="lbl-${t.key}-r">${t.right}</span>
        </div>
        <span class="soul-val-display" id="sval-${t.key}">50</span>
      </div>
      <div class="slider-track">
        <div class="slider-fill"  id="sf-${t.key}" style="width:50%"></div>
        <div class="slider-thumb" id="st-${t.key}" style="left:50%"></div>
      </div>
    </div>
  `).join('');
}

function updateSoulSliders(soul) {
  // Push to history ring (max 8 entries ≈ 32s at 4s poll)
  soulHistory.push({ EI: soul.EI, SN: soul.SN, TF: soul.TF, JP: soul.JP });
  if (soulHistory.length > 8) soulHistory.shift();
  const baseline = soulHistory.length >= 4 ? soulHistory[0] : null;

  TRAITS.forEach(t => {
    const val = soul[t.key];
    document.getElementById(`sf-${t.key}`).style.width  = `${val}%`;
    document.getElementById(`st-${t.key}`).style.left   = `${val}%`;

    // Trend arrow — compare against oldest entry in history window
    let arrow = '';
    if (baseline) {
      const delta = val - baseline[t.key];
      if      (delta >  0.05) arrow = ' ↑';
      else if (delta < -0.05) arrow = ' ↓';
    }
    document.getElementById(`sval-${t.key}`).textContent = val.toFixed(1) + arrow;
    document.getElementById(`lbl-${t.key}-l`).classList.toggle('active', val < 50);
    document.getElementById(`lbl-${t.key}-r`).classList.toggle('active', val >= 50);
  });
}

function onSliderClick(e, trait) {
  const rect = e.currentTarget.getBoundingClientRect();
  const val  = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  fetch(`${API}/soul`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ trait, value: val }) });
}

// ── PEOPLE PAGE ───────────────────────────────────────────────
function renderPeoplePage(persons) {
  const body = document.getElementById('people-page-body');
  if (!persons || !persons.length) {
    body.innerHTML = '<div class="log-item" style="padding:20px">No people yet.</div>';
    return;
  }

  body.innerHTML = persons.map(p => {
    const warmth  = Math.round(p.warmth);
    const contact = Math.round(100 - p.distance);
    const notes   = p.notes || [];
    const convStr = p.conversation_count ? `${p.conversation_count} conversation${p.conversation_count === 1 ? '' : 's'}` : 'no conversations yet';
    const isOpen  = expandedPersons.has(p.id);

    const notesHtml = notes.length
      ? notes.map(n => `<div class="person-note-entry${n.followed_up ? ' followed-up' : ''}">${n.text}</div>`).join('')
      : '<div class="person-empty">no notes yet</div>';

    return `
      <div class="person-full-card" id="pcard-${p.id}">
        <div class="person-full-header" onclick="togglePersonExpand('${p.id}')">
          <div class="person-full-info">
            <div class="person-full-name">${p.name}</div>
            <div class="person-full-summary">${convStr} · warmth ${warmth}</div>
          </div>
          <div class="person-full-warmth-mini">
            <div class="person-full-warmth-mini-fill" style="width:${warmth}%"></div>
          </div>
          <div class="person-chevron${isOpen ? ' open' : ''}">▼</div>
        </div>
        <div class="person-full-body${isOpen ? ' open' : ''}" id="pbody-${p.id}">
          <div class="person-full-body-inner">

            <div class="person-detail-section">
              <div class="person-detail-label">relationship</div>
              <div class="person-stat-row">
                <div class="person-stat-key">warmth</div>
                <div class="person-stat-bar"><div class="person-stat-fill person-warmth-fill" style="width:${warmth}%"></div></div>
                <div class="person-stat-num">${warmth}</div>
              </div>
              <div class="person-stat-row">
                <div class="person-stat-key">contact</div>
                <div class="person-stat-bar"><div class="person-stat-fill person-contact-fill" style="width:${contact}%"></div></div>
                <div class="person-stat-num">${contact}</div>
              </div>
            </div>

            <div class="person-detail-section">
              <div class="person-detail-label">conversations</div>
              <div class="person-conv-count">${convStr}</div>
            </div>

            <div class="person-detail-section">
              <div class="person-detail-label">notes</div>
              <div class="person-notes-list">${notesHtml}</div>
            </div>

          </div>
        </div>
      </div>`;
  }).join('');
}

function togglePersonExpand(id) {
  if (expandedPersons.has(id)) {
    expandedPersons.delete(id);
  } else {
    expandedPersons.add(id);
  }
  // Re-render
  if (state && state.persons) renderPeoplePage(state.persons);
}

function renderPersonPills(persons) {
  document.getElementById('person-pills').innerHTML = persons.map(p => `
    <button class="person-pill${activePerson === p.id ? ' active' : ''}"
            data-id="${p.id}" onclick="selectPerson('${p.id}')">${p.name}</button>
  `).join('');
}

function selectPerson(id) {
  activePerson = id;
  document.querySelectorAll('.person-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.id === id));
  if (state) renderChat(state.chat);
}

// ── CHAT BUBBLE ───────────────────────────────────────────────
function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('chat-panel');
  panel.classList.toggle('open', chatOpen);
  if (chatOpen) {
    document.getElementById('chat-notif').classList.remove('show');
    prevMsgCount = (state?.chat || []).filter(m => !m.person_id || m.person_id === activePerson).length;
    // Scroll to bottom
    const container = document.getElementById('chat-messages');
    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
    document.getElementById('chat-input').focus();
  }
}

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;

  document.querySelectorAll('.mtab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));

  const isGraph  = tab === 'graph';
  const isPeople = tab === 'people';
  const isPanel  = !isGraph && !isPeople;

  document.getElementById('page-panel').classList.toggle('active',  isPanel);
  document.getElementById('page-graph').classList.toggle('active',  isGraph);
  document.getElementById('page-people').classList.toggle('active', isPeople);

  if (isGraph) {
    requestAnimationFrame(() => {
      const canvas = document.getElementById('graph-canvas');
      if (canvas.offsetWidth > 0) {
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        if (!panInitialized) {
          pan.x = canvas.width  / 2;
          pan.y = canvas.height / 2;
          panInitialized = true;
        }
      }
    });
  }

  if (isPeople && state?.persons) renderPeoplePage(state.persons);
  if (isPanel && state) renderPanel(state);
}

// ── PANEL RENDER ──────────────────────────────────────────────
function renderPanel(s) {
  const body = document.getElementById('panel-body');

  if (activeTab === 'memory') {
    body.innerHTML = (s.memories || []).map(m => {
      const cls = { dream:'memory-dream', creative:'memory-creative', reflection:'memory-reflection', journal:'memory-journal' }[m.type] || '';
      return `<div class="memory-item ${cls}">
        <div class="memory-meta">${m.type} · w${m.weight.toFixed(2)} · ${(m.tags||[]).join(', ')}</div>
        <div class="memory-text">${m.text}</div>
      </div>`;
    }).join('') || '<div class="log-item">No memories.</div>';

  } else if (activeTab === 'ideas') {
    body.innerHTML = (s.ideas || []).map(i =>
      `<div class="idea-item"><div class="idea-text">${i}</div></div>`
    ).join('') || '<div class="log-item">No ideas yet.</div>';

  } else if (activeTab === 'mind') {
    const wants   = s.wants   || [];
    const beliefs = s.beliefs || [];
    const goals   = s.goals   || [];
    body.innerHTML = `
      <div class="mind-section-title">wants</div>
      ${wants.length ? wants.map(w => `
        <div class="want-item">
          <div class="want-text ${w.resolved?'resolved':''}">${w.resolved?'✓':'◦'} ${w.text}</div>
          <div class="want-tags">${(w.tags||[]).join(' · ')}</div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}
      <div class="mind-section-title">goals</div>
      ${goals.length ? goals.map(g => `
        <div class="want-item">
          <div class="want-text ${g.resolved?'resolved':''}">${g.resolved?'✓':'→'} ${g.text}</div>
          <div class="want-tags">${(g.tags||[]).join(' · ')}</div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}
      <div class="mind-section-title">beliefs</div>
      ${beliefs.length ? beliefs.map(b => `
        <div class="belief-item">
          <div class="belief-text">${b.text}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:5px">
            <div class="belief-conf-track" style="flex:1"><div class="belief-conf-fill" style="width:${Math.round(b.confidence*100)}%"></div></div>
            <div style="font-size:8px;color:var(--text3);width:28px">${Math.round(b.confidence*100)}%</div>
          </div>
        </div>`).join('') : '<div class="log-item" style="padding:8px 0">none yet</div>'}`;

  } else if (activeTab === 'admin') {
    renderAdmin(s, body);

  } else {
    // log
    const logHtml = (s.log || []).map(l => `<div class="log-item">${l}</div>`).join('');
    if (body.dataset.logFingerprint !== logHtml.slice(0, 80)) {
      body.dataset.logFingerprint = logHtml.slice(0, 80);
      body.innerHTML = logHtml;
    }
  }
}

function renderAdmin(s, body) {
  const v = s.vitals;
  const vitalRows = [
    { key:'energy',    label:'energy',    val: Math.round(v.energy),         color:'var(--blue)',   apiKey:'energy'    },
    { key:'social',    label:'social',    val: Math.round(v.social_battery), color:'var(--violet)', apiKey:'social'    },
    { key:'curiosity', label:'curiosity', val: Math.round(v.curiosity),      color:'var(--teal)',   apiKey:'curiosity' },
  ];
  const vitalsHtml = vitalRows.map(r => `
    <div class="admin-vital-row">
      <div class="admin-vital-label">${r.label}</div>
      <div class="admin-vital-val">${r.val}</div>
      <button class="admin-btn" onclick="nudgeVital('${r.apiKey}',${r.val},-10)">−</button>
      <div class="admin-vital-bar" style="flex:1"><div class="admin-vital-fill" style="width:${r.val}%;background:${r.color}"></div></div>
      <button class="admin-btn" onclick="nudgeVital('${r.apiKey}',${r.val},+10)">+</button>
    </div>`).join('');

  const currentMood = s.affect?.mood || 'content';
  const moodHtml = MOODS.map(m => `
    <button class="admin-mood-btn ${m === currentMood ? 'active' : ''}"
            style="${m === currentMood ? `color:${MOOD_COLORS[m]}` : ''}"
            onclick="setMood('${m}')">${m}</button>`).join('');

  const soul = s.soul || {};
  const soulHtml = TRAITS.map(t => {
    const val    = Math.round(soul[t.key] ?? 50);
    const active = val >= 50 ? t.right : t.left;
    return `
      <div class="admin-soul-row">
        <div class="admin-soul-key">${t.key}</div>
        <div class="admin-soul-num">${val}</div>
        <div class="slider-track" style="flex:1" onclick="onSliderClick(event,'${t.key}')">
          <div class="slider-fill"  style="width:${val}%"></div>
          <div class="slider-thumb" style="left:${val}%"></div>
        </div>
        <div style="font-size:8px;color:var(--gold2);width:14px;text-align:center">${active}</div>
      </div>`;
  }).join('');

  const currentAct = s.activity || 'rest';
  const actHtml = ACTIVITIES.map(a => `
    <button class="admin-act-btn ${a.id === currentAct ? 'active' : ''}" onclick="setActivity('${a.id}')">
      <span class="admin-act-icon">${a.icon}</span>${a.label}
    </button>`).join('');

  const testingActive = !!s.testing_mode;
  body.innerHTML = `
    <div class="admin-block">
      <button class="admin-cocaine-btn ${testingActive ? 'active' : ''}" onclick="toggleTestingMode()">
        ${testingActive ? '⚡ cocaine mode: ON' : 'cocaine mode'}
      </button>
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">vitals</div>
      ${vitalsHtml}
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">mood</div>
      <div class="admin-mood-grid">${moodHtml}</div>
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">activity</div>
      <div class="admin-act-grid">${actHtml}</div>
    </div>
    <div class="admin-divider"></div>
    <div class="admin-block">
      <div class="admin-block-title">soul</div>
      ${soulHtml}
      <button class="admin-reset-btn" onclick="resetSoulBaseline()">reset baseline</button>
    </div>`;
}

// ── ADMIN ACTIONS ─────────────────────────────────────────────
async function nudgeVital(key, current, delta) {
  const val = Math.max(0, Math.min(100, current + delta));
  await fetch(`${API}/vitals`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ [key]: val }) });
  await poll();
}

async function setMood(mood) {
  await fetch(`${API}/affect`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mood }) });
  await poll();
}

async function setActivity(id) {
  await fetch(`${API}/activity`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ activity_id: id }) });
  await poll();
}

function resetSoulBaseline() {
  const defaults = { EI:58, SN:62, TF:56, JP:67 };
  Promise.all(Object.entries(defaults).map(([trait, value]) =>
    fetch(`${API}/soul`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ trait, value }) })
  )).then(() => poll());
}

async function toggleTestingMode() {
  await fetch(`${API}/testing`, { method:'POST' });
  await poll();
}

// ── CHAT ─────────────────────────────────────────────────────
function renderChat(messages) {
  if (!messages) return;
  const container = document.getElementById('chat-messages');
  const filtered = messages.filter(m => !m.person_id || m.person_id === activePerson);
  const last = filtered[filtered.length - 1];
  const fingerprint = `${activePerson}:${filtered.length}:${last ? last.from + last.time + last.text.slice(0,30) : ''}`;
  if (container.dataset.fingerprint === fingerprint) return;
  container.dataset.fingerprint = fingerprint;
  if (!filtered.length) {
    container.innerHTML = '<div style="color:var(--text3);padding:12px;font-size:11px">no messages yet</div>';
    return;
  }
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
  container.innerHTML = filtered.map(m => `
    <div class="msg ${m.from === 'chloe' ? 'msg-chloe' + (m.autonomous ? ' msg-auto' : '') : 'msg-user'}">
      <div class="msg-meta">${m.from === 'chloe' ? 'chloe' : m.person_id || 'you'} · ${m.time}${m.autonomous ? ' · unprompted' : ''}</div>
      ${m.text}
    </div>`).join('');
  if (atBottom) container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg   = input.value.trim();
  if (!msg) return;
  input.value = '';

  const container = document.getElementById('chat-messages');
  const now  = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  container.innerHTML += `<div class="msg msg-user"><div class="msg-meta">you (${activePerson}) · ${time}</div>${msg}</div>`;
  container.dataset.fingerprint = '';
  container.scrollTop = container.scrollHeight;

  try {
    const res = await fetch(`${API}/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: msg, person_id: activePerson })
    });
    if (!res.ok) {
      container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">error</div>server returned ${res.status}</div>`;
      container.scrollTop = container.scrollHeight;
      return;
    }
    const data = await res.json();
    if (data.queued) {
      container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">chloe · asleep</div>she'll see this when she wakes up</div>`;
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) {
    container.innerHTML += `<div class="msg msg-chloe msg-queued"><div class="msg-meta">error</div>can't reach server</div>`;
    container.scrollTop = container.scrollHeight;
    return;
  }
  await poll();
}

// ── GRAPH ────────────────────────────────────────────────────
function initGraph() {
  const canvas = document.getElementById('graph-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    const w = canvas.offsetWidth;
    const h = canvas.offsetHeight;
    if (w === 0 || h === 0) return;
    canvas.width  = w;
    canvas.height = h;
    if (!panInitialized) {
      pan.x = w / 2;
      pan.y = h / 2;
      panInitialized = true;
    }
  }
  new ResizeObserver(resize).observe(canvas);

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const n = hitNode(e);
    if (n && !n.fixed) {
      draggingNode = n;
      dragOrigin   = { x: e.clientX, y: e.clientY };
      nodeMoved    = false;
      canvas.style.cursor = 'grabbing';
    } else {
      isPanning = true;
      panStart  = { x: e.clientX - pan.x, y: e.clientY - pan.y };
      canvas.style.cursor = 'grabbing';
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (draggingNode) {
      const dx = e.clientX - dragOrigin.x;
      const dy = e.clientY - dragOrigin.y;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) nodeMoved = true;
      draggingNode.x  += dx / zoom;
      draggingNode.y  += dy / zoom;
      draggingNode.vx  = 0;
      draggingNode.vy  = 0;
      dragOrigin = { x: e.clientX, y: e.clientY };
    } else if (isPanning) {
      pan.x = e.clientX - panStart.x;
      pan.y = e.clientY - panStart.y;
    } else {
      canvas.style.cursor = hitNode(e) ? 'pointer' : 'grab';
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (draggingNode && !nodeMoved) handleNodeClick(draggingNode);
    draggingNode = null;
    isPanning    = false;
    canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('mouseleave', () => {
    draggingNode = null;
    isPanning    = false;
    canvas.style.cursor = 'grab';
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoom = Math.max(0.3, Math.min(3, zoom - e.deltaY * 0.001));
  }, { passive: false });

  canvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    const n = hitNode(e);
    if (n && !n.fixed) {
      nodeMenuTarget = n;
      const menu = document.getElementById('node-menu');
      document.getElementById('node-menu-label').textContent = n.label;
      menu.style.left    = e.clientX + 'px';
      menu.style.top     = e.clientY + 'px';
      menu.style.display = 'block';
      e.stopPropagation();
    }
  });

  (function loop() { stepPhysics(); draw(ctx, canvas); requestAnimationFrame(loop); })();
}

function hitNode(e) {
  const rect = document.getElementById('graph-canvas').getBoundingClientRect();
  const mx   = (e.clientX - rect.left  - pan.x) / zoom;
  const my   = (e.clientY - rect.top   - pan.y) / zoom;
  for (const n of physicsNodes) {
    const r  = nodeRadius(n) + 4;
    const dx = n.x - mx, dy = n.y - my;
    if (dx*dx + dy*dy < r*r) return n;
  }
  return null;
}

function handleNodeClick(n) {
  if (selectedNodeId === n.id) {
    expandNode(n.id);
  } else {
    selectedNodeId = n.id;
    const info = document.getElementById('sel-info');
    document.getElementById('sel-label').textContent = n.label;
    document.getElementById('sel-note').textContent  = n.note || '';
    const hitsEl = document.getElementById('sel-hits');
    if (n.hit_count > 0) {
      hitsEl.textContent = `${n.hit_count} resonance${n.hit_count === 1 ? '' : 's'}`;
      hitsEl.style.display = 'block';
    } else {
      hitsEl.style.display = 'none';
    }
    info.classList.add('visible');
  }
}

function mergeGraph(newGraph) {
  if (!newGraph?.nodes) return;
  graph = newGraph;
  const existing = {};
  physicsNodes.forEach(n => existing[n.id] = n);
  physicsNodes = graph.nodes.map(n => {
    if (existing[n.id]) return { ...n, x: existing[n.id].x, y: existing[n.id].y, vx: existing[n.id].vx||0, vy: existing[n.id].vy||0 };
    const parent = existing[n.parent];
    const angle  = Math.random() * Math.PI * 2;
    const dist   = 120 + Math.random() * 40;
    return { ...n, x: parent ? parent.x + Math.cos(angle)*dist : (Math.random()-.5)*300, y: parent ? parent.y + Math.sin(angle)*dist : (Math.random()-.5)*300, vx:0, vy:0 };
  });
}

function stepPhysics() {
  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);
  physicsNodes.forEach(n => { n.fx = 0; n.fy = 0; });

  for (let i = 0; i < physicsNodes.length; i++) {
    for (let j = i+1; j < physicsNodes.length; j++) {
      const a = physicsNodes[i], b = physicsNodes[j];
      const dx = b.x-a.x, dy = b.y-a.y;
      const d  = Math.sqrt(dx*dx+dy*dy) || 0.1;
      const minD = 80;
      if (d < minD) {
        const f = (minD-d)/d*0.5;
        if (!a.fixed) { a.fx -= dx*f; a.fy -= dy*f; }
        if (!b.fixed) { b.fx += dx*f; b.fy += dy*f; }
      }
    }
  }

  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a||!b) return;
    const dx = b.x-a.x, dy = b.y-a.y;
    const d  = Math.sqrt(dx*dx+dy*dy)||0.1;
    const f  = (d-130)/d*0.05;
    if (!a.fixed) { a.fx += dx*f; a.fy += dy*f; }
    if (!b.fixed) { b.fx -= dx*f; b.fy -= dy*f; }
  });

  physicsNodes.forEach(n => { if (!n.fixed) { n.fx -= n.x*0.006; n.fy -= n.y*0.006; } });

  physicsNodes.forEach(n => {
    if (n.fixed || n === draggingNode) return;
    n.vx = (n.vx + n.fx) * 0.82;
    n.vy = (n.vy + n.fy) * 0.82;
    n.x += n.vx;
    n.y += n.vy;
  });
}

function draw(ctx, canvas) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(pan.x, pan.y);
  ctx.scale(zoom, zoom);

  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);

  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a||!b) return;
    const sel = e.from === selectedNodeId || e.to === selectedNodeId;
    const col = sel ? (DEPTH_COLORS[nodeMap[e.to]?.depth||0]||'#d4849a') : '#1c1e2c';
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle = col; ctx.globalAlpha = sel ? 0.6 : 0.35;
    ctx.lineWidth = sel ? 1.2 : 0.6; ctx.stroke(); ctx.globalAlpha = 1;
  });

  physicsNodes.forEach(n => {
    const r   = nodeRadius(n);
    const col = DEPTH_COLORS[Math.min(n.depth, DEPTH_COLORS.length-1)];
    const sel = n.id === selectedNodeId;
    const dragged = n === draggingNode;
    // item 34: opacity bonus for repeatedly-hit nodes (caps at +0.18)
    const hitGlow = Math.min(0.18, Math.log1p(n.hit_count || 0) * 0.03);

    if (sel || dragged) {
      ctx.beginPath(); ctx.arc(n.x, n.y, r+8, 0, Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.globalAlpha = dragged ? 0.5 : 0.25;
      ctx.stroke(); ctx.globalAlpha = 1;
    }
    if (n.is_new) {
      ctx.beginPath(); ctx.arc(n.x, n.y, r*1.8, 0, Math.PI*2);
      ctx.fillStyle = col; ctx.globalAlpha = 0.15; ctx.fill(); ctx.globalAlpha = 1;
    }

    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.globalAlpha = (n.depth === 0 ? 0.25 : 0.15) + hitGlow;
    ctx.fill(); ctx.globalAlpha = 1;

    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.strokeStyle = col; ctx.lineWidth = (sel||dragged) ? 1.5 : 0.7 + hitGlow * 3;
    ctx.globalAlpha = (sel||dragged) ? 1 : 0.5 + hitGlow; ctx.stroke(); ctx.globalAlpha = 1;

    ctx.fillStyle = col; ctx.globalAlpha = (sel||dragged) ? 1 : 0.65 + hitGlow * 0.5;
    ctx.font = `${n.depth===0?500:400} ${n.depth===0?10:8}px 'DM Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(n.label.toUpperCase(), n.x, n.y+r+11);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function nodeRadius(n) {
  if (n.depth === 0) return 26;
  // item 34: log scale so early hits give visible boost, later hits diminish
  const hitFactor = 1 + Math.log1p(n.hit_count || 0) * 0.12;
  return Math.max(7, 18 * (n.strength||0.8) * (1 - n.depth*0.1) * hitFactor);
}

async function expandNode(nodeId) {
  document.getElementById('sel-info').classList.remove('visible');
  selectedNodeId = null;
  await fetch(`${API}/expand`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ node_id: nodeId }) });
  await poll();
}

function expandSelected() { if (selectedNodeId) expandNode(selectedNodeId); }

function removeMenuNode() {
  if (!nodeMenuTarget) return;
  const id = nodeMenuTarget.id;
  document.getElementById('node-menu').style.display = 'none';
  nodeMenuTarget = null;
  physicsNodes = physicsNodes.filter(n => n.id !== id);
  graph.nodes  = (graph.nodes  || []).filter(n => n.id !== id);
  graph.edges  = (graph.edges  || []).filter(e => e.from !== id && e.to !== id);
  if (selectedNodeId === id) {
    selectedNodeId = null;
    document.getElementById('sel-info').classList.remove('visible');
  }
  fetch(`${API}/graph/${id}`, { method:'DELETE' });
}
