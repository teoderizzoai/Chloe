<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07080a;
  --bg2:       #0d0f12;
  --bg3:       #121519;
  --border:    #1c2028;
  --border2:   #252b35;
  --text:      #8a9ab0;
  --text2:     #4a5568;
  --text3:     #2a3040;
  --gold:      #c8a96e;
  --gold2:     #8a6d3e;
  --blue:      #4a7fa8;
  --teal:      #3a8a7a;
  --violet:    #6a5a9a;
  --rose:      #8a4a5a;
  --sage:      #4a7a5a;
  --font-mono: 'DM Mono', monospace;
  --font-serif: 'Cormorant Garamond', serif;
  --r:         6px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  overflow: hidden;
}

/* ── LAYOUT ────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  grid-template-rows: 52px 1fr 200px;
  height: 100vh;
  gap: 1px;
  background: var(--border);
}

.topbar   { grid-column: 1 / -1; background: var(--bg2); display: flex; align-items: center; padding: 0 20px; gap: 20px; border-bottom: 1px solid var(--border); }
.sidebar  { background: var(--bg2); overflow-y: auto; }
.main     { background: var(--bg); overflow: hidden; position: relative; }
.panel    { background: var(--bg2); overflow: hidden; }
.chatbar  { grid-column: 1 / -1; background: var(--bg2); display: flex; flex-direction: column; border-top: 1px solid var(--border); }

/* ── TOPBAR ────────────────────────────────────────────────── */
.name {
  font-family: var(--font-serif);
  font-size: 22px;
  font-weight: 300;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 2px;
  margin-right: 8px;
}

/* ── PROFILE CARD ───────────────────────────────────────────── */
.profile-card {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.profile-img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  object-position: center 15%;
  display: block;
  filter: saturate(0.60) brightness(0.85);
}
.profile-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 40px 16px 16px;
  background: linear-gradient(to top,
    rgba(7,8,10,0.92) 0%,
    rgba(7,8,10,0.35) 50%,
    transparent 100%);
}
.profile-name {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 300; font-style: normal;
  color: #ccd6ea; letter-spacing: 4px;
  text-transform: uppercase;
  line-height: 1; margin-bottom: 8px;
}
.profile-meta {
  display: flex; align-items: center; gap: 8px;
}
.profile-activity {
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text2); margin-top: 5px;
}
.profile-mood-badge {
  position: absolute; top: 14px; right: 14px;
  font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
  border-radius: 10px; padding: 3px 10px;
  border: 1px solid currentColor;
  background: rgba(7,8,10,0.55);
  backdrop-filter: blur(6px);
  transition: color 2s ease;
}
.mbti-pill {
  font-size: 8px;
  letter-spacing: 4px;
  color: #7a90aa;
  border: 1px solid #2a3545;
  border-radius: 20px;
  padding: 2px 10px;
}
.state-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 6px var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.state-label { font-size: 9px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; }
.busy-indicator { font-size: 9px; color: var(--gold2); letter-spacing: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.spacer { flex: 1; }
.tick-counter { font-size: 9px; color: var(--text3); letter-spacing: 1px; }

/* ── SIDEBAR (vitals + soul) ────────────────────────────────── */
.section { padding: 16px; border-bottom: 1px solid var(--border); }
.section-title {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 14px;
}

/* Vitals */
.vital { margin-bottom: 12px; }
.vital-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
.vital-val { color: var(--text); }
.bar-track { height: 2px; background: var(--bg3); border-radius: 1px; }
.bar-fill  { height: 100%; border-radius: 1px; transition: width 1.5s ease; }
.bar-energy  { background: var(--blue); box-shadow: 0 0 4px var(--blue); }
.bar-social  { background: var(--violet); box-shadow: 0 0 4px var(--violet); }
.bar-curiosity { background: var(--teal); box-shadow: 0 0 4px var(--teal); }

/* Soul sliders */
.soul-slider { margin-bottom: 16px; }
.soul-labels { display: flex; justify-content: space-between; font-size: 8px; color: var(--text3); margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
.soul-labels span.active { color: var(--gold2); }
.slider-track {
  height: 4px; background: var(--bg3); border-radius: 2px;
  position: relative; cursor: pointer;
}
.slider-fill { position: absolute; top: 0; height: 100%; border-radius: 2px; background: linear-gradient(to right, var(--blue), var(--gold)); transition: width 1.2s ease; }
.slider-thumb {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); transition: left 1.2s ease;
  box-shadow: 0 0 6px var(--gold2);
}

/* Interests */
.interest-cloud { display: flex; flex-wrap: wrap; gap: 5px; }
.interest-tag {
  font-size: 8px; letter-spacing: 1px; color: var(--text2);
  border: 1px solid var(--border2); border-radius: 12px;
  padding: 2px 8px;
  transition: border-color 0.3s, color 0.3s;
}
.interest-tag:hover { border-color: var(--gold2); color: var(--gold); cursor: default; }

/* Soul description */
.soul-desc { font-family: var(--font-serif); font-size: 13px; font-style: italic; color: var(--text2); line-height: 1.7; padding: 12px 0 4px; }
.world-line { font-size: 11px; color: var(--text2); line-height: 1.8; letter-spacing: 0.02em; }

/* Activity buttons */
.activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.act-btn {
  padding: 8px 6px; border-radius: var(--r);
  border: 1px solid var(--border);
  background: transparent; color: var(--text2);
  font-family: var(--font-mono); font-size: 8px;
  letter-spacing: 1px; text-align: center;
  cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.act-btn:hover { border-color: var(--border2); color: var(--text); }
.act-btn.active { border-color: var(--gold2); color: var(--gold); background: #1a150a; }
.act-icon { font-size: 14px; }

/* ── GRAPH CANVAS ───────────────────────────────────────────── */
#graph-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
#graph-canvas:active { cursor: grabbing; }

.graph-overlay {
  position: absolute; bottom: 12px; left: 12px;
  font-size: 8px; color: var(--text3); letter-spacing: 2px;
  pointer-events: none;
}
.graph-selected-info {
  position: absolute; top: 12px; right: 12px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 10px 14px;
  max-width: 220px; display: none;
}
.graph-selected-info.visible { display: block; }
.sel-label { font-size: 11px; color: var(--gold); margin-bottom: 4px; }
.sel-note { font-size: 9px; color: var(--text2); line-height: 1.6; margin-bottom: 8px; }
.sel-expand {
  font-size: 8px; letter-spacing: 2px; color: var(--gold2);
  border: 1px solid #2a2010; border-radius: 3px;
  padding: 3px 8px; cursor: pointer; background: none;
  font-family: var(--font-mono);
}
.sel-expand:hover { color: var(--gold); border-color: var(--gold2); }

/* ── RIGHT PANEL (memory + log) ──────────────────────────────── */
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
.ptab {
  flex: 1; padding: 10px 0; font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; color: var(--text3);
  cursor: pointer; background: none; border: none; font-family: var(--font-mono);
  border-bottom: 2px solid transparent; transition: all 0.2s;
}
.ptab.active { color: var(--gold2); border-bottom-color: var(--gold2); }

.panel-body { height: calc(100% - 38px); overflow-y: auto; padding: 12px; }
.panel-body::-webkit-scrollbar { width: 2px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

.memory-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
.memory-meta { font-size: 8px; color: var(--text3); letter-spacing: 1px; margin-bottom: 3px; }
.memory-text { font-size: 9px; color: var(--text2); line-height: 1.7; }
.memory-item:hover .memory-text { color: var(--text); }

.idea-item { padding: 6px 0; border-bottom: 1px solid var(--border); }
.idea-text { font-size: 9px; color: #4a6a8a; line-height: 1.7; }
.idea-text::before { content: "→ "; color: var(--text3); }

.log-item { padding: 4px 0; font-size: 9px; color: var(--text3); line-height: 1.6; border-bottom: 1px solid var(--border); }
.log-item:first-child { color: var(--text2); }

/* ── CHAT BAR ───────────────────────────────────────────────── */
.chat-messages {
  flex: 1; overflow-y: auto; padding: 10px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.chat-messages::-webkit-scrollbar { width: 2px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

.msg {
  max-width: 55%; padding: 8px 12px; border-radius: 8px;
  font-size: 10px; line-height: 1.6;
}
.msg-chloe {
  align-self: flex-start; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px 8px 8px 2px;
  color: var(--text);
}
.msg-user {
  align-self: flex-end; background: #0d1a0d;
  border: 1px solid #1a2a1a; border-radius: 8px 8px 2px 8px;
  color: #5a8a5a;
}
.msg-auto { border-color: var(--gold2); }
.msg-meta { font-size: 7px; color: var(--text3); letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }

.chat-input-row {
  display: flex; gap: 8px; padding: 8px 16px;
  border-top: 1px solid var(--border);
}
.chat-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 7px 12px; color: var(--text);
  font-family: var(--font-mono); font-size: 11px; outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--gold2); }
.chat-input::placeholder { color: var(--text3); }
.send-btn {
  padding: 7px 14px; background: #1a150a; border: 1px solid var(--gold2);
  border-radius: var(--r); color: var(--gold2); font-family: var(--font-mono);
  font-size: 11px; cursor: pointer; transition: all 0.2s;
}
.send-btn:hover { background: #251e0f; color: var(--gold); }

/* scrollbar global */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── MOOD PILL ──────────────────────────────────────────────── */
.mood-pill {
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  border-radius: 10px; padding: 2px 9px;
  border: 1px solid currentColor;
  transition: color 2s ease, background 2s ease;
}

/* ── MIND TAB ───────────────────────────────────────────────── */
.mind-section { margin-bottom: 4px; }
.mind-section-title {
  font-size: 7px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text3); padding: 10px 0 5px;
}
.want-item  { padding: 7px 0; border-bottom: 1px solid var(--border); }
.want-text  { font-size: 9px; color: var(--text2); line-height: 1.7; }
.want-text.resolved { color: var(--text3); text-decoration: line-through; opacity: 0.5; }
.want-tags  { font-size: 7px; color: var(--text3); letter-spacing: 1px; margin-top: 2px; }
.belief-item { padding: 7px 0; border-bottom: 1px solid var(--border); }
.belief-text { font-size: 9px; color: var(--text2); line-height: 1.7; font-style: italic; }
.belief-conf-track { height: 2px; background: var(--bg3); border-radius: 1px; margin-top: 5px; }
.belief-conf-fill  { height: 100%; border-radius: 1px; background: var(--rose); transition: width 1.5s ease; }

/* ── MEMORY TYPE ACCENTS ────────────────────────────────────── */
.memory-dream    { border-left: 2px solid var(--violet); padding-left: 8px; }
.memory-creative { border-left: 2px solid var(--gold2);  padding-left: 8px; }
</style>
</head>
<body>

<div class="shell">

  <!-- ── TOPBAR ──────────────────────────────────────────────── -->
  <header class="topbar">
    <span class="busy-indicator" id="busy" style="display:none">thinking···</span>
    <span class="spacer"></span>
    <span class="tick-counter">tick <span id="tick-n">0</span></span>
  </header>

  <!-- ── LEFT SIDEBAR ────────────────────────────────────────── -->
  <aside class="sidebar">

    <!-- Profile card -->
    <div class="profile-card">
      <img class="profile-img" src="image.webp" alt="">
      <div class="profile-mood-badge" id="mood-pill" style="color:var(--teal)">content</div>
      <div class="profile-overlay">
        <div class="profile-name">Chloe</div>
        <div class="profile-meta">
          <span class="mbti-pill" id="mbti">INFP</span>
          <span class="state-dot" id="state-dot"></span>
        </div>
        <div class="profile-activity" id="state-label">Resting</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">vitals</div>
      <div class="vital">
        <div class="vital-row"><span>⚡ energy</span><span class="vital-val" id="v-energy">72%</span></div>
        <div class="bar-track"><div class="bar-fill bar-energy" id="b-energy" style="width:72%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>📡 social</span><span class="vital-val" id="v-social">58%</span></div>
        <div class="bar-track"><div class="bar-fill bar-social" id="b-social" style="width:58%"></div></div>
      </div>
      <div class="vital">
        <div class="vital-row"><span>🔮 curiosity</span><span class="vital-val" id="v-curiosity">80%</span></div>
        <div class="bar-track"><div class="bar-fill bar-curiosity" id="b-curiosity" style="width:80%"></div></div>
      </div>
    </div>

    <div class="section" id="world-section">
      <div class="section-title">world</div>
      <div class="world-line" id="world-season">—</div>
      <div class="world-line" id="world-weather">—</div>
    </div>

    <div class="section">
      <div class="section-title">soul</div>
      <div id="soul-sliders"></div>
      <div class="soul-desc" id="soul-desc">Loading…</div>
    </div>

    <div class="section">
      <div class="section-title">interests</div>
      <div class="interest-cloud" id="interests"></div>
    </div>

    <div class="section">
      <div class="section-title">activity</div>
      <div class="activity-grid" id="activity-grid"></div>
    </div>

  </aside>

  <!-- ── GRAPH CANVAS ────────────────────────────────────────── -->
  <main class="main">
    <canvas id="graph-canvas"></canvas>
    <div class="graph-overlay">scroll · zoom &nbsp;|&nbsp; click · select &nbsp;|&nbsp; click again · expand</div>
    <div class="graph-selected-info" id="sel-info">
      <div class="sel-label" id="sel-label"></div>
      <div class="sel-note" id="sel-note"></div>
      <button class="sel-expand" id="sel-expand-btn">↳ expand</button>
    </div>
  </main>

  <!-- ── RIGHT PANEL ─────────────────────────────────────────── -->
  <div class="panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchTab('memory')">memory</button>
      <button class="ptab" onclick="switchTab('ideas')">ideas</button>
      <button class="ptab" onclick="switchTab('mind')">mind</button>
      <button class="ptab" onclick="switchTab('log')">log</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- ── CHAT BAR ─────────────────────────────────────────────── -->
  <div class="chatbar">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="say something to Chloe…" autocomplete="off" />
      <button class="send-btn" id="send-btn">→</button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const API = 'http://localhost:8000';
const POLL_MS = 4000;

const MOOD_COLORS = {
  content:    '#4a7a5a', restless:   '#8a7a3e', irritable:  '#8a4a4a',
  melancholic:'#4a5a8a', curious:    '#3a8a7a', serene:     '#5a8a6a',
  energized:  '#c8a96e', lonely:     '#6a5a8a',
};

// ── STATE ────────────────────────────────────────────────────
let state = null;
let activeTab = 'memory';
let selectedNodeId = null;
let graph = { nodes: [], edges: [] };

// Graph canvas state
let pan = { x: 0, y: 0 };
let zoom = 1;
let isPanning = false;
let panStart = null;
let physicsNodes = [];  // local copy with velocity for smooth physics
let animFrame = null;

const ACTIVITIES = [
  { id: 'sleep',   icon: '🌙', label: 'Sleep'    },
  { id: 'dream',   icon: '💭', label: 'Dream'    },
  { id: 'rest',    icon: '🛋️', label: 'Rest'     },
  { id: 'read',    icon: '🔍', label: 'Research' },
  { id: 'think',   icon: '🧠', label: 'Think'    },
  { id: 'message', icon: '💬', label: 'Message'  },
  { id: 'create',  icon: '✨', label: 'Create'   },
];

const DEPTH_COLORS = ['#c8a96e','#4a7fa8','#6a5a9a','#3a8a7a','#8a4a5a','#8a7a3a'];

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildActivityGrid();
  buildSoulSliders();
  initGraph();
  poll();
  setInterval(poll, POLL_MS);
  document.getElementById('send-btn').onclick = sendChat;
  document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
  document.getElementById('sel-expand-btn').onclick = expandSelected;
});

// ── POLLING ───────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch(`${API}/snapshot`);
    if (!res.ok) return;
    state = await res.json();
    applyState(state);
  } catch (e) {
    // server not yet up — silently wait
  }
}

function applyState(s) {
  // Topbar
  document.getElementById('mbti').textContent = s.mbti_type;
  document.getElementById('state-label').textContent = s.heartbeat?.label ?? s.activity;
  document.getElementById('tick-n').textContent = s.tick;
  document.getElementById('busy').style.display = s.busy ? 'inline' : 'none';

  // Vitals
  setVital('energy',    s.vitals.energy);
  setVital('social',    s.vitals.social_battery);
  setVital('curiosity', s.vitals.curiosity);

  // World (weather + season)
  const seasonEl  = document.getElementById('world-season');
  const weatherEl = document.getElementById('world-weather');
  seasonEl.textContent = s.season ? `${s.circadian} · ${s.season}` : s.circadian ?? '—';
  if (s.weather) {
    const w = s.weather;
    weatherEl.textContent = `${w.description}, ${w.temperature_c}°C · ${w.feels_like} · ${w.location}`;
  } else {
    weatherEl.textContent = 'weather unknown';
  }

  // Mood pill
  if (s.affect) {
    const pill  = document.getElementById('mood-pill');
    const color = MOOD_COLORS[s.affect.mood] || '#4a5568';
    pill.textContent = s.affect.mood;
    pill.style.color = color;
    pill.style.background = color + '22';
    pill.style.borderColor = color + '88';
  }

  // Soul sliders (animate smoothly)
  updateSoulSliders(s.soul);

  // Soul description
  document.getElementById('soul-desc').textContent = s.soul_desc;

  // Interests
  const cloud = document.getElementById('interests');
  cloud.innerHTML = s.interests.map(i => `<span class="interest-tag">${i}</span>`).join('');

  // Activity buttons
  document.querySelectorAll('.act-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.id === s.activity);
  });

  // Graph — merge new data, keep physics positions
  mergeGraph(s.graph);

  // Panel
  renderPanel(s);

  // Chat
  renderChat(s.chat);
}

function setVital(key, val) {
  const pct = Math.round(val);
  document.getElementById(`v-${key}`).textContent = `${pct}%`;
  document.getElementById(`b-${key}`).style.width = `${pct}%`;
}

// ── SOUL SLIDERS ─────────────────────────────────────────────
const TRAITS = [
  { key: 'EI', left: 'E', right: 'I' },
  { key: 'SN', left: 'S', right: 'N' },
  { key: 'TF', left: 'T', right: 'F' },
  { key: 'JP', left: 'J', right: 'P' },
];

function buildSoulSliders() {
  const container = document.getElementById('soul-sliders');
  container.innerHTML = TRAITS.map(t => `
    <div class="soul-slider" id="slider-${t.key}">
      <div class="soul-labels">
        <span id="lbl-${t.key}-l" class="active">${t.left}</span>
        <span id="lbl-${t.key}-r">${t.right}</span>
      </div>
      <div class="slider-track" data-trait="${t.key}" onclick="onSliderClick(event, '${t.key}')">
        <div class="slider-fill" id="sf-${t.key}" style="width:50%"></div>
        <div class="slider-thumb" id="st-${t.key}" style="left:50%"></div>
      </div>
    </div>
  `).join('');
}

function updateSoulSliders(soul) {
  TRAITS.forEach(t => {
    const val = soul[t.key];
    document.getElementById(`sf-${t.key}`).style.width = `${val}%`;
    document.getElementById(`st-${t.key}`).style.left = `${val}%`;
    document.getElementById(`lbl-${t.key}-l`).classList.toggle('active', val < 50);
    document.getElementById(`lbl-${t.key}-r`).classList.toggle('active', val >= 50);
  });
}

function onSliderClick(e, trait) {
  const track = e.currentTarget;
  const rect = track.getBoundingClientRect();
  const val = Math.round(((e.clientX - rect.left) / rect.width) * 100);
  fetch(`${API}/soul`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trait, value: val })
  });
}

// ── ACTIVITY GRID ─────────────────────────────────────────────
function buildActivityGrid() {
  const grid = document.getElementById('activity-grid');
  grid.innerHTML = ACTIVITIES.map(a => `
    <button class="act-btn" data-id="${a.id}" onclick="setActivity('${a.id}')">
      <span class="act-icon">${a.icon}</span>${a.label}
    </button>
  `).join('');
}

function setActivity(id) {
  fetch(`${API}/activity`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ activity_id: id })
  });
}

// ── PANEL TABS ────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.ptab').forEach(t => {
    t.classList.toggle('active', t.textContent.trim() === tab);
  });
  if (state) renderPanel(state);
}

function renderPanel(s) {
  const body = document.getElementById('panel-body');

  if (activeTab === 'memory') {
    body.innerHTML = (s.memories || []).map(m => {
      const accent = m.type === 'dream' ? 'memory-dream' : m.type === 'creative' ? 'memory-creative' : '';
      return `<div class="memory-item ${accent}">
        <div class="memory-meta">${m.type} · w${m.weight.toFixed(2)} · ${m.tags?.join(', ') || ''}</div>
        <div class="memory-text">${m.text}</div>
      </div>`;
    }).join('');

  } else if (activeTab === 'ideas') {
    body.innerHTML = (s.ideas || []).map(idea => `
      <div class="idea-item"><div class="idea-text">${idea}</div></div>
    `).join('') || '<div class="log-item">No ideas yet.</div>';

  } else if (activeTab === 'mind') {
    const wants   = s.wants   || [];
    const beliefs = s.beliefs || [];

    const wantsHtml = wants.length
      ? wants.map(w => `
          <div class="want-item">
            <div class="want-text ${w.resolved ? 'resolved' : ''}">
              ${w.resolved ? '✓' : '◦'} ${w.text}
            </div>
            <div class="want-tags">${(w.tags || []).join(' · ')}</div>
          </div>`).join('')
      : '<div class="log-item" style="padding:8px 0">no wants yet — she is watching</div>';

    const beliefsHtml = beliefs.length
      ? beliefs.map(b => `
          <div class="belief-item">
            <div class="belief-text">${b.text}</div>
            <div class="belief-conf-track">
              <div class="belief-conf-fill" style="width:${Math.round(b.confidence * 100)}%"></div>
            </div>
          </div>`).join('')
      : '<div class="log-item" style="padding:8px 0">no beliefs formed yet</div>';

    body.innerHTML = `
      <div class="mind-section">
        <div class="mind-section-title">wants</div>
        ${wantsHtml}
      </div>
      <div class="mind-section" style="margin-top:8px">
        <div class="mind-section-title">beliefs</div>
        ${beliefsHtml}
      </div>`;

  } else {
    body.innerHTML = (s.log || []).map(l => `
      <div class="log-item">${l}</div>
    `).join('');
  }
}

// ── CHAT ─────────────────────────────────────────────────────
let lastChatLen = 0;

function renderChat(messages) {
  if (!messages || messages.length === lastChatLen) return;
  lastChatLen = messages.length;
  const container = document.getElementById('chat-messages');
  container.innerHTML = messages.map(m => `
    <div class="msg ${m.from === 'chloe' ? 'msg-chloe' + (m.autonomous ? ' msg-auto' : '') : 'msg-user'}">
      <div class="msg-meta">${m.from === 'chloe' ? 'chloe' : 'you'} · ${m.time}${m.autonomous ? ' · unprompted' : ''}</div>
      ${m.text}
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  // Optimistic — add user message immediately
  const container = document.getElementById('chat-messages');
  const now = new Date();
  const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  container.innerHTML += `<div class="msg msg-user"><div class="msg-meta">you · ${time}</div>${msg}</div>`;
  container.scrollTop = container.scrollHeight;

  await fetch(`${API}/chat`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
  });
  await poll(); // immediate refresh
}

// ── GRAPH ─────────────────────────────────────────────────────
const DEPTH_RADII = [26, 18, 14, 11, 9, 8];

function initGraph() {
  const canvas = document.getElementById('graph-canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    pan.x = canvas.width  / 2;
    pan.y = canvas.height / 2;
  }
  resize();
  new ResizeObserver(resize).observe(canvas);

  // Pan
  canvas.addEventListener('mousedown', e => {
    isPanning = true;
    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
  });
  canvas.addEventListener('mousemove', e => {
    if (isPanning) {
      pan.x = e.clientX - panStart.x;
      pan.y = e.clientY - panStart.y;
    }
  });
  canvas.addEventListener('mouseup', () => isPanning = false);
  canvas.addEventListener('mouseleave', () => isPanning = false);

  // Zoom
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    zoom = Math.max(0.3, Math.min(3, zoom - e.deltaY * 0.001));
  }, { passive: false });

  // Click
  canvas.addEventListener('click', e => {
    if (isPanning) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - pan.x) / zoom;
    const my = (e.clientY - rect.top  - pan.y) / zoom;

    let hit = null;
    for (const n of physicsNodes) {
      const r = nodeRadius(n);
      const dx = n.x - mx, dy = n.y - my;
      if (dx*dx + dy*dy < r*r + 10) { hit = n; break; }
    }

    if (hit) {
      if (selectedNodeId === hit.id) {
        expandNode(hit.id);
      } else {
        selectedNodeId = hit.id;
        showSelInfo(hit);
      }
    } else {
      selectedNodeId = null;
      document.getElementById('sel-info').classList.remove('visible');
    }
  });

  // Physics + render loop
  function loop() {
    stepPhysics();
    draw(ctx, canvas);
    animFrame = requestAnimationFrame(loop);
  }
  loop();
}

function mergeGraph(newGraph) {
  if (!newGraph || !newGraph.nodes) return;
  graph = newGraph;

  // Preserve positions of existing nodes; initialise new ones
  const existing = {};
  physicsNodes.forEach(n => existing[n.id] = n);

  physicsNodes = graph.nodes.map(n => {
    if (existing[n.id]) {
      return { ...n, x: existing[n.id].x, y: existing[n.id].y, vx: existing[n.id].vx || 0, vy: existing[n.id].vy || 0 };
    }
    // New node — place near parent if possible
    const parent = existing[n.parent];
    const angle = Math.random() * Math.PI * 2;
    const dist  = 120 + Math.random() * 40;
    return {
      ...n,
      x:  parent ? parent.x + Math.cos(angle) * dist : (Math.random() - 0.5) * 300,
      y:  parent ? parent.y + Math.sin(angle) * dist : (Math.random() - 0.5) * 300,
      vx: 0, vy: 0,
    };
  });
}

function stepPhysics() {
  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);

  // Reset forces
  physicsNodes.forEach(n => { n.fx = 0; n.fy = 0; });

  // Repulsion
  for (let i = 0; i < physicsNodes.length; i++) {
    for (let j = i + 1; j < physicsNodes.length; j++) {
      const a = physicsNodes[i], b = physicsNodes[j];
      if (a.fixed || b.fixed) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx*dx + dy*dy) || 0.1;
      const minD = 85;
      if (d < minD) {
        const f = (minD - d) / d * 0.5;
        a.fx -= dx * f; a.fy -= dy * f;
        b.fx += dx * f; b.fy += dy * f;
      }
    }
  }

  // Springs (edges)
  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const dx = b.x - a.x, dy = b.y - a.y;
    const d  = Math.sqrt(dx*dx + dy*dy) || 0.1;
    const target = 130;
    const f = (d - target) / d * 0.05;
    if (!a.fixed) { a.fx += dx * f; a.fy += dy * f; }
    if (!b.fixed) { b.fx -= dx * f; b.fy -= dy * f; }
  });

  // Gravity
  physicsNodes.forEach(n => {
    if (n.fixed) return;
    n.fx -= n.x * 0.006;
    n.fy -= n.y * 0.006;
  });

  // Integrate with damping
  const damp = 0.82;
  physicsNodes.forEach(n => {
    if (n.fixed) return;
    n.vx = (n.vx + n.fx) * damp;
    n.vy = (n.vy + n.fy) * damp;
    n.x += n.vx;
    n.y += n.vy;
  });
}

function draw(ctx, canvas) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(pan.x, pan.y);
  ctx.scale(zoom, zoom);

  const nodeMap = {};
  physicsNodes.forEach(n => nodeMap[n.id] = n);

  // Edges
  graph.edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    const sel = e.from === selectedNodeId || e.to === selectedNodeId;
    const col = sel ? (DEPTH_COLORS[nodeMap[e.to]?.depth || 0] || '#c8a96e') : '#1c2028';
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = col;
    ctx.globalAlpha = sel ? 0.6 : 0.4;
    ctx.lineWidth = sel ? 1.2 : 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  });

  // Nodes
  physicsNodes.forEach(n => {
    const r   = nodeRadius(n);
    const col = DEPTH_COLORS[Math.min(n.depth, DEPTH_COLORS.length - 1)];
    const sel = n.id === selectedNodeId;

    // Outer glow for selected
    if (sel) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 8, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.25;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // New node flash
    if (n.is_new) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.15;
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Circle fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.globalAlpha = n.depth === 0 ? 0.25 : 0.15;
    ctx.fill();
    ctx.globalAlpha = 1;

    // Circle border
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = col;
    ctx.lineWidth = sel ? 1.5 : 0.7;
    ctx.globalAlpha = sel ? 1 : 0.5;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Label
    ctx.fillStyle = col;
    ctx.globalAlpha = sel ? 1 : 0.65;
    ctx.font = `${n.depth === 0 ? 500 : 400} ${n.depth === 0 ? 10 : 8}px 'DM Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(n.label.toUpperCase(), n.x, n.y + r + 11);
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function nodeRadius(n) {
  if (n.depth === 0) return 26;
  return Math.max(7, 18 * (n.strength || 0.8) * (1 - n.depth * 0.1));
}

function showSelInfo(node) {
  const info = document.getElementById('sel-info');
  document.getElementById('sel-label').textContent = node.label;
  document.getElementById('sel-note').textContent = node.note || '';
  info.classList.add('visible');
}

async function expandNode(nodeId) {
  document.getElementById('sel-info').classList.remove('visible');
  selectedNodeId = null;
  await fetch(`${API}/expand`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ node_id: nodeId })
  });
  await poll();
}

function expandSelected() {
  if (selectedNodeId) expandNode(selectedNodeId);
}
</script>
